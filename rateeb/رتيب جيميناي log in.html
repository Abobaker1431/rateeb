<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رِتِّيب — نظام حياتك اليومي</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a5f4a;
    --primary-light: #2d8a6e;
    --accent: #c9a84c;
    --accent-light: #e8d5a3;
    --bg: #f5f0e6;
    --card: #ffffff;
    --text: #2c2416;
    --text-light: #6b5d4d;
    --danger: #b33939;
    --success: #2d8a6e;
    --warning: #c9a84c;
    --shadow: 0 4px 20px rgba(44,36,22,0.08);
    --radius: 16px;
    --font-main: 'Tajawal', sans-serif;
    --font-quran: 'Amiri', serif;
    --sidebar-bg: #ffffff;
    --header-text: #ffffff;
    --base-font-size: 16px;
  }
  body.dark-mode {
    --bg: #1a1a2e;
    --card: #16213e;
    --text: #e0e0e0;
    --text-light: #a0a0b0;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
    --sidebar-bg: #0f3460;
    --accent-light: #2d3a5a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size: var(--base-font-size); }
  body {
    font-family: var(--font-main);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s, color 0.4s;
    font-weight: 500; /* جعل الخط أوضح قليلاً */
  }
  body.custom-bg { background-size: cover; background-position: center; background-attachment: fixed; }
  body.custom-bg::before { content:''; position:fixed; inset:0; background: rgba(245,240,230,0.85); z-index:-1; }
  body.dark-mode.custom-bg::before { background: rgba(10,10,30,0.85); }
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn 0.6s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

  /* Login / Auth - Professional Styling */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, #1a3c2f 0%, #2d5a47 50%, #1a3c2f 100%);
    position: relative; overflow: hidden; padding: 20px;
  }
  .auth-wrapper {
    width: 100%; max-width: 400px; z-index: 1;
  }
  .login-card {
    background: var(--card);
    border-radius: 20px; padding: 40px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
  }
  body.dark-mode .login-card { background: rgba(22, 33, 62, 0.95); }
  .login-logo { font-family: var(--font-quran); font-size: 3.5rem; color: var(--primary); margin-bottom: 5px; text-shadow: 2px 2px 0 var(--accent-light); }
  .login-sub { color: var(--text-light); font-size: 1.1rem; margin-bottom: 30px; font-weight: 700; }
  
  .modern-input-group { margin-bottom: 15px; position: relative; }
  .modern-input-group input {
    width: 100%; padding: 16px 20px;
    background: #f8f9fa; border: 1px solid #e1e4e8;
    border-radius: 12px; font-family: var(--font-main); font-size: 1rem;
    color: #24292e; transition: all 0.3s ease; box-sizing: border-box;
  }
  body.dark-mode .modern-input-group input { background: #1a1a2e; border-color: #2d3a5a; color: #fff; }
  .modern-input-group input:focus {
    outline: none; border-color: var(--primary); background: #fff;
    box-shadow: 0 0 0 3px rgba(26, 95, 74, 0.1);
  }
  body.dark-mode .modern-input-group input:focus { background: #0f3460; }
  
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding: 16px 28px; border: none; border-radius: 12px; font-family: var(--font-main);
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,95,74,0.3); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { background: #d4b55a; transform: translateY(-2px); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 8px 16px; font-size: 0.9rem; }
  .btn-full { width: 100%; }

  .auth-switch {
    margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.1);
    color: var(--text-light); font-size: 0.95rem;
  }
  body.dark-mode .auth-switch { border-top-color: rgba(255,255,255,0.1); }
  .auth-switch button {
    background: none; border: none; color: var(--primary); font-weight: 800;
    font-family: var(--font-main); font-size: 0.95rem; cursor: pointer; margin: 0 5px;
  }
  .auth-switch button:hover { text-decoration: underline; }

  /* App Layout */
  #app { display: none; min-height: 100vh; }
  .app-header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .app-header h1 { font-family: var(--font-quran); font-size: 1.8rem; display:flex; align-items:center; gap:10px; margin: 0;}
  .header-actions { display:flex; gap:10px; align-items:center; }
  .header-actions button { background: rgba(255,255,255,0.15); color:#fff; border:none; padding:8px 14px; border-radius:10px; cursor:pointer; font-family:var(--font-main); font-weight:700; transition:0.3s; }
  .header-actions button:hover { background: rgba(255,255,255,0.3); }
  .user-badge { display:flex; align-items:center; gap:8px; background: rgba(255,255,255,0.15); padding:6px 14px; border-radius:20px; font-weight:700; }

  .main-layout { display: flex; min-height: calc(100vh - 68px); }
  .sidebar {
    width: 260px; background: var(--sidebar-bg); border-inline-end: 1px solid rgba(0,0,0,0.05); padding: 20px;
    display: flex; flex-direction: column; gap: 8px; overflow-y: auto; transition: background 0.4s;
  }
  body.dark-mode .sidebar { border-inline-end-color: rgba(255,255,255,0.05); }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px;
    cursor: pointer; transition: all 0.3s; font-weight: 700; color: var(--text-light);
  }
  .nav-item:hover { background: var(--bg); color: var(--primary); }
  .nav-item.active { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(26,95,74,0.25); }
  .nav-item svg { width: 22px; height: 22px; }

  .content-area { flex: 1; padding: 30px; overflow-y: auto; }
  .page-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 25px; color: var(--primary); display:flex; align-items:center; gap:10px; }

  .card {
    background: var(--card); border-radius: var(--radius); padding: 24px;
    box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid rgba(150,150,150,0.1);
    transition: background 0.4s;
  }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .card-title { font-weight: 800; font-size: 1.25rem; color: var(--primary); margin: 0; }
  .grid-2 { display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .grid-3 { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  .grid-4 { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }

  /* Input fields inside App */
  .input-group { margin-bottom: 16px; }
  .input-group label { display:block; font-weight: 700; margin-bottom: 8px; color: var(--text); font-size: 0.95rem; }
  .input-group input, .input-group select {
    width:100%; padding: 14px 16px; border: 2px solid rgba(150,150,150,0.2); border-radius: 12px;
    font-family: var(--font-main); font-size: 1rem; transition: all 0.3s; background: var(--card); color: var(--text);
  }
  .input-group input:focus, .input-group select:focus { outline:none; border-color: var(--primary); }

  /* Tasks / Schedule */
  .schedule-table { width: 100%; border-collapse: collapse; }
  .schedule-table th, .schedule-table td { padding: 16px 14px; text-align: start; border-bottom: 1px solid rgba(150,150,150,0.1); color: var(--text); }
  .schedule-table th { background: var(--bg); color: var(--primary); font-weight: 800; font-size: 1rem; }
  .schedule-table tr:hover { background: var(--bg); }
  .task-checkbox { width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer; }
  .task-done td { text-decoration: line-through; color: var(--text-light); opacity: 0.7; }
  .category-badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
  .cat-religious { background: #e8f5e9; color: #1a5f4a; }
  .cat-study { background: #e3f2fd; color: #1565c0; }
  .cat-sport { background: #fff3e0; color: #e65100; }
  .cat-social { background: #f3e5f5; color: #7b1fa2; }
  .cat-moral { background: #fce4ec; color: #c62828; }
  .cat-distractor { background: #ffebee; color: #b33939; }

  /* Stats */
  .stat-circle { width: 130px; height: 130px; border-radius: 50%; border: 10px solid var(--bg); border-top-color: var(--primary); display: flex; align-items: center; justify-content: center; flex-direction: column; margin: 0 auto; position: relative; }
  .stat-circle::after { content: attr(data-label); position: absolute; bottom: -28px; font-size: 0.9rem; font-weight: 700; color: var(--text-light); }
  .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
  .progress-bar { height: 12px; background: rgba(150,150,150,0.1); border-radius: 6px; overflow: hidden; margin-top: 10px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 6px; transition: width 0.6s ease; }

  /* Group */
  .group-card { background: var(--card); border-radius: var(--radius); padding: 24px; border: 2px solid var(--accent-light); margin-bottom: 20px; }
  .leaderboard-row { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid rgba(150,150,150,0.1); }
  .leaderboard-rank { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.9rem; }
  .rank-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #fff; }
  .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #fff; }
  .rank-3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
  .rank-other { background: var(--bg); color: var(--text-light); }
  .vote-card { background: var(--bg); border: 1px solid rgba(255,205,210,0.5); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .share-link-box { background: var(--bg); padding: 14px; border-radius: 10px; font-family: monospace; font-size: 0.9rem; word-break: break-all; border: 1px dashed var(--accent); color: var(--text); }
  
  /* Settings */
  .color-picker { display: flex; gap: 12px; flex-wrap: wrap; }
  .color-swatch { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--card), 0 0 0 4px var(--text); }
  .bg-option { width: 90px; height: 65px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; background-size: cover; background-position: center; }
  .bg-option.active { border-color: var(--primary); }
  .layout-toggle { display: flex; gap: 12px; flex-wrap: wrap; }
  .layout-option { padding: 12px 24px; border: 2px solid rgba(150,150,150,0.2); border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; color: var(--text); }
  .layout-option.active { border-color: var(--primary); background: var(--primary); color: #fff; }
  
  .toggle-switch { position: relative; display: inline-block; width: 56px; height: 30px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 30px; transition: .4s; }
  .toggle-slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: .4s; }
  input:checked + .toggle-slider { background: var(--primary); }
  input:checked + .toggle-slider:before { transform: translateX(26px); }
  html[dir="rtl"] input:checked + .toggle-slider:before { transform: translateX(-26px); left: auto; right: 4px;}
  html[dir="rtl"] .toggle-slider:before { left: auto; right: 4px;}
  
  .developer-card { background: linear-gradient(135deg, #1a3c2f, #2d5a47); color: #fff; border-radius: var(--radius); padding: 24px; margin-bottom: 20px; text-align: center; }
  .developer-name { font-family: var(--font-quran); font-size: 1.6rem; color: var(--accent); margin-bottom: 8px; }
  .developer-date { font-size: 1rem; color: rgba(255,255,255,0.8); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 20px; padding: 30px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); color: var(--text); }
  .modal h3 { margin-bottom: 20px; color: var(--primary); font-size: 1.4rem; }
  .modal-close { float: inline-end; background: none; border: none; font-size: 1.8rem; cursor: pointer; color: var(--text-light); line-height: 1; }

  /* Toast */
  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; padding: 14px 28px; border-radius: 12px; font-weight: 700; z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease; font-size: 1rem;}

  /* Distraction Suggestion */
  .sug-box { background: rgba(45, 138, 110, 0.1); border-right: 4px solid var(--primary); padding: 12px; margin-top: 8px; border-radius: 8px; font-size: 0.95rem; color: var(--primary); }
  html[dir="ltr"] .sug-box { border-right: none; border-left: 4px solid var(--primary); }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { width: 100%; position: fixed; bottom: 0; right: 0; left: 0; z-index: 80; flex-direction: row; justify-content: space-around; padding: 10px; border-inline-end: none; border-top: 1px solid rgba(0,0,0,0.05); }
    .nav-item { flex-direction: column; padding: 8px; font-size: 0.8rem; gap: 6px; }
    .nav-item span { display: none; }
    .main-layout { flex-direction: column; padding-bottom: 80px; }
    .content-area { padding: 20px; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }
  .task-row { transition: all 0.3s; }
  .streak-flame { color: #e65100; animation: pulse-soft 1.5s infinite; }
  @keyframes pulse-soft { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
  
  .lang-btn { padding: 10px 20px; border: 2px solid var(--accent); border-radius: 12px; cursor: pointer; font-weight: 700; background: transparent; color: var(--text); transition: 0.3s; font-size: 0.95rem; }
  .lang-btn.active { background: var(--accent); color: #fff; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="auth-wrapper">
    <div class="login-card fade-in hidden" id="register-card">
      <div class="login-logo">رِتِّيب</div>
      <div class="login-sub" id="text_create_acc">إنشاء حساب جديد</div>

      <div class="modern-input-group">
        <input type="text" id="reg-username" placeholder="اسم المستخدم" autocomplete="off" required>
      </div>
      <div class="modern-input-group">
        <input type="email" id="reg-email" placeholder="البريد الإلكتروني" autocomplete="off" required>
      </div>
      <div class="modern-input-group">
        <input type="password" id="reg-password" placeholder="كلمة المرور" required>
      </div>

      <button class="btn btn-primary btn-full" onclick="doRegister()">
        <span id="text_btn_register">إنشاء الحساب</span>
      </button>

      <div class="auth-switch">
        <span id="text_have_acc">لديك حساب بالفعل؟</span>
        <button onclick="switchToLogin()" id="text_switch_login">تسجيل الدخول</button>
      </div>
    </div>

    <div class="login-card fade-in" id="signin-card">
      <div class="login-logo">رِتِّيب</div>
      <div class="login-sub" id="text_login_sub">تسجيل الدخول</div>

      <div class="modern-input-group">
        <input type="email" id="signin-email" placeholder="البريد الإلكتروني" autocomplete="off" required>
      </div>
      <div class="modern-input-group">
        <input type="password" id="signin-password" placeholder="كلمة المرور" required>
      </div>

      <button class="btn btn-primary btn-full" onclick="doSignIn()">
        <span id="text_btn_login">دخول</span>
      </button>

      <div class="auth-switch">
        <span id="text_no_acc">ليس لديك حساب؟</span>
        <button onclick="switchToRegister()" id="text_switch_register">إنشاء حساب</button>
      </div>
    </div>
  </div>
</div>

<div id="app">
  <div class="app-header">
    <h1 id="app_logo_title">رِتِّيب</h1>
    <div class="header-actions">
      <div class="user-badge">
        <span id="header-username">—</span>
      </div>
      <button onclick="showPage('settings')" id="btn_settings_header">الإعدادات</button>
      <button onclick="doLogout()" id="btn_logout">خروج</button>
    </div>
  </div>

  <div class="main-layout">
    <div class="sidebar" id="sidebar-nav">
      </div>
    <div class="content-area" id="content-area"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ===================== TRANSLATIONS =====================
const i18n = {

function todayStr() { return new Date().toISOString().split('T')[0]; }

function loadState() {
  const saved = localStorage.getItem('rateeb_state_v2');
  if (saved) {
    state = { ...state, ...JSON.parse(saved) };
    if (!state.tasks || state.tasks.length === 0) state.tasks = JSON.parse(JSON.stringify(defaultTasks));
    if (!state.settings.lang) state.settings.lang = 'ar';
    if (!state.settings.fontSize) state.settings.fontSize = '16px';
  } else {
    state.tasks = JSON.parse(JSON.stringify(defaultTasks));
  }
  applySettings();
  applyLang();
}
function saveState() { localStorage.setItem('rateeb_state_v2', JSON.stringify(state)); }

// ===================== ACCOUNTS =====================
function getAccounts() { return JSON.parse(localStorage.getItem('rateeb_accounts') || '{}'); }
function saveAccounts(accounts) { localStorage.setItem('rateeb_accounts', JSON.stringify(accounts)); }

function switchToLogin() {
  document.getElementById('register-card').classList.add('hidden');
  document.getElementById('signin-card').classList.remove('hidden');
}
function switchToRegister() {
  document.getElementById('signin-card').classList.add('hidden');
  document.getElementById('register-card').classList.remove('hidden');
}

function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;

  if (!username || !email || !password) { alert('الرجاء إدخال جميع الحقول'); return; }

  const accounts = getAccounts();
  if (accounts[email]) { alert('هذا البريد الإلكتروني مسجل بالفعل'); return; }

  accounts[email] = { username, password };
  saveAccounts(accounts);
  enterApp(username, email);
}

function doSignIn() {
  const email    = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;

  if (!email || !password) return;
  const accounts = getAccounts();
  const account  = accounts[email];

  if (!account || account.password !== password) {
    alert('البريد الإلكتروني أو كلمة المرور غير صحيحة'); return;
  }
  enterApp(account.username, email);
}

function enterApp(username, email) {
  state.user = username;
  state.email = email;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  document.getElementById('header-username').textContent = username;
  saveState();
  renderSidebar();
  showPage('dashboard');
}

function doLogout() {
  if (!confirm('هل تريد الخروج؟')) return;
  state.user = null; state.email = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').classList.remove('hidden');
  switchToLogin();
}

// ===================== NAVIGATION =====================
function showPage(page) {
  state.currentPage = page;
  renderSidebar();
  const container = document.getElementById('content-area');
  container.innerHTML = '';
  if (page === 'dashboard') renderDashboard(container);
  else if (page === 'schedule') renderSchedule(container);
  else if (page === 'stats') renderStats(container);
  else if (page === 'groups') renderGroups(container);
  else if (page === 'settings') renderSettings(container);
}

function generateDistractionSuggestion(text) {
  const lower = text.toLowerCase();
  if (lower.match(/هاتف|جوال|تيك توك|انستجرام|سوشيال|phone|tiktok|insta/)) return t('sug_phone');
  if (lower.match(/نوم|نعاس|كسل|ارهاق|sleep|tired/)) return t('sug_sleep');
  if (lower.match(/تفكير|قلق|توتر|overthink|anxiety/)) return t('sug_think');
  return t('sug_general');
}

function openAddDistractor() {
  const text = prompt(t('dash_add_dist') + '?');
  if (text && text.trim()) {
    const sug = generateDistractionSuggestion(text);
    state.distractors.unshift({ text, suggestion: sug, date: todayStr(), time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    saveState(); showPage('dashboard');
  }
}

function renderSchedule(el) {
  const layoutClass = state.settings.layout === 'horizontal' ? 'schedule-horizontal' : '';
  el.innerHTML = `
    <div class="page-title">📅 ${t('nav_schedule')}</div>
    <div class="card ${layoutClass}">
      <div class="card-header">
        <div class="card-title">${new Date().toLocaleDateString(state.settings.lang==='ar'?'ar-SA':'en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}</div>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-sm btn-accent" onclick="openAddTask()">${t('sch_new_task')}</button>
          <button class="btn btn-sm btn-primary" onclick="resetDay()">${t('sch_new_day')}</button>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table class="schedule-table">
          <thead><tr><th>${t('sch_task')}</th><th>${t('sch_time')}</th><th>${t('sch_cat')}</th><th>${t('sch_status')}</th><th></th></tr></thead>
          <tbody>
            ${state.tasks.filter(t => t.date === todayStr()).sort((a,b)=>a.time.localeCompare(b.time)).map(task => `
              <tr class="task-row ${task.done ? 'task-done' : ''}">
                <td><strong>${task.title}</strong></td>
                <td style="font-weight:700;">${task.time}</td>
                <td><span class="category-badge cat-${task.category}">${catName(task.category)}</span></td>
                <td><input type="checkbox" class="task-checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${task.id})"></td>
                <td><button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})">🗑️</button></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function toggleTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; saveState(); showPage('schedule'); }
}
function deleteTask(id) {
  state.tasks = state.tasks.filter(x => x.id !== id);
  saveState(); showPage('schedule');
}
function resetDay() {
  state.tasks.forEach(t => { if (t.date === todayStr()) t.done = false; });
  saveState(); showPage('schedule');
}
function openAddTask() {
  const cats = ['religious','study','sport','social','moral'];
  openModal(`
    <h3>${t('sch_new_task')}</h3>
    <div class="input-group"><label>${t('sch_task')}</label><input type="text" id="new-task-title" placeholder="..."></div>
    <div class="input-group"><label>${t('sch_time')}</label><input type="time" id="new-task-time" value="12:00"></div>
    <div class="input-group"><label>${t('sch_cat')}</label>
      <select id="new-task-cat">${cats.map(c=>`<option value="${c}">${catIcon(c)} ${catName(c)}</option>`).join('')}</select>
    </div>
    <button class="btn btn-primary btn-full" onclick="confirmAddTask()">${t('sch_new_task')}</button>
  `);
}
function confirmAddTask() {
  const title = document.getElementById('new-task-title').value.trim();
  const time = document.getElementById('new-task-time').value || '12:00';
  const cat = document.getElementById('new-task-cat').value || 'study';
  if (!title) return;
  state.tasks.push({ id: Date.now(), title, time, category: cat, done: false, date: todayStr() });
  saveState(); closeModal(); showPage('schedule');
}

// ===================== STATS =====================
function renderStats(el) {
  const dates = [...new Set(state.tasks.map(t => t.date))].sort();
  const dailyStats = dates.slice(-7).map(d => {
    const dayTasks = state.tasks.filter(t => t.date === d);
    const done = dayTasks.filter(t => t.done).length;
    return { date: d, total: dayTasks.length, done, pct: dayTasks.length ? Math.round((done/dayTasks.length)*100) : 0 };
  });
  const weekly = { total: 0, done: 0 }, monthly = { total: 0, done: 0 };
  state.tasks.forEach(t => {
    if (t.done) { monthly.done++; monthly.total++; if (new Date(t.date) >= new Date(Date.now() - 7*86400000)) { weekly.done++; weekly.total++; }
    } else { monthly.total++; if (new Date(t.date) >= new Date(Date.now() - 7*86400000)) weekly.total++; }
  });
  const allCats = ['religious','study','sport','social','moral'];
  el.innerHTML = `
    <div class="page-title">📊 ${t('nav_stats')}</div>
    <div class="grid-3">
      <div class="card" style="text-align:center;">
        <div class="card-title">📊 ${t('stat_week')}</div>
        <div style="font-size:2.5rem;font-weight:800;color:var(--primary);margin:12px 0;">${weekly.total ? Math.round((weekly.done/weekly.total)*100) : 0}%</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${weekly.total ? (weekly.done/weekly.total)*100 : 0}%"></div></div>
      </div>
      <div class="card" style="text-align:center;">
        <div class="card-title">📈 ${t('stat_month')}</div>
        <div style="font-size:2.5rem;font-weight:800;color:var(--primary);margin:12px 0;">${monthly.total ? Math.round((monthly.done/monthly.total)*100) : 0}%</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${monthly.total ? (monthly.done/monthly.total)*100 : 0}%"></div></div>
      </div>
      <div class="card" style="text-align:center;">
        <div class="card-title">🏆 ${t('stat_best')}</div>
        <div style="font-size:1.5rem;font-weight:800;color:var(--accent);margin:20px 0;">
          ${dailyStats.length ? dailyStats.reduce((a,b)=>a.pct>b.pct?a:b).date : '—'}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📅 ${t('stat_last7')}</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:20px;">
        ${dailyStats.map(d=>`
          <div style="flex:1;min-width:110px;text-align:center;padding:16px;background:var(--bg);border-radius:12px;">
            <div style="font-size:0.85rem;color:var(--text-light);margin-bottom:8px;font-weight:700;">${d.date}</div>
            <div style="font-size:1.6rem;font-weight:800;color:var(--primary);">${d.pct}%</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${d.pct}%"></div></div>
          </div>`).join('')}
      </div>
    </div>
  `;
}

function saveProfile() {
  const newEmail = document.getElementById('set-email').value.trim();
  const newPass  = document.getElementById('set-password').value;
  if(!newEmail) return;

  const accounts = getAccounts();
  const oldEmail = state.email;

  if(newEmail !== oldEmail && accounts[newEmail]) {
    alert('هذا البريد الإلكتروني مسجل مسبقاً!'); return;
  }

  const accountData = accounts[oldEmail];
  if(newPass) accountData.password = newPass;

  if(newEmail !== oldEmail) {
    accounts[newEmail] = accountData;
    delete accounts[oldEmail];
    state.email = newEmail;
  } else {
    accounts[oldEmail] = accountData;
  }

  saveAccounts(accounts);
  saveState();
  showToast(t('set_save') + ' ✅');
  renderSettings(document.getElementById('content-area'));
}

function setFontSize(size) {
  state.settings.fontSize = size;
  document.documentElement.style.setProperty('--base-font-size', size);
  saveState(); renderSettings(document.getElementById('content-area'));
}

function toggleDarkMode(on) {
  state.settings.theme = on ? 'dark' : 'light';
  document.body.classList.toggle('dark-mode', on);
  saveState();
}

function setLang(lang) {
  state.settings.lang = lang;
  saveState(); applyLang();
}

function setColor(c) {
  state.settings.primaryColor = c;
  document.documentElement.style.setProperty('--primary', c);
  saveState(); renderSettings(document.getElementById('content-area'));
}

function setBg(bg) {
  state.settings.bgImage = bg;
  document.body.classList.toggle('custom-bg', bg !== '');
  if (bg === 'mosque') document.body.style.backgroundImage = 'linear-gradient(135deg,#1a3c2f,#2d5a47)';
  else if (bg === 'pattern') document.body.style.backgroundImage = 'repeating-linear-gradient(45deg,#c9a84c,#c9a84c 5px,#f5f0e6 5px,#f5f0e6 25px)';
  else if (bg === 'night') document.body.style.backgroundImage = 'linear-gradient(135deg,#0f2027,#203a43,#2c5364)';
  else document.body.style.backgroundImage = '';
  saveState(); renderSettings(document.getElementById('content-area'));
}

function applySettings() {
  if (state.settings.primaryColor) document.documentElement.style.setProperty('--primary', state.settings.primaryColor);
  if (state.settings.fontSize) document.documentElement.style.setProperty('--base-font-size', state.settings.fontSize);
  if (state.settings.theme === 'dark') document.body.classList.add('dark-mode');
  setBg(state.settings.bgImage || '');
}

function clearAllData() {
  if (!confirm('هل أنت متأكد؟')) return;
  localStorage.removeItem('rateeb_state_v2');
  location.reload();
}

// ===================== MODAL & TOAST =====================
function openModal(html) {
  document.getElementById('modal-content').innerHTML = '<button class="modal-close" onclick="closeModal()">✕</button>' + html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ===================== INIT =====================
loadState();
if (state.user) {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  document.getElementById('header-username').textContent = state.user;
  renderSidebar(); showPage(state.currentPage || 'dashboard');
} else {
  applyLangToAuth();
}
</script>
