<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رتيب — نظام حياتك اليومي</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a5f4a;
    --primary-light: #2d8a6e;
    --accent: #c9a84c;
    --accent-light: #e8d5a3;
    --bg: #f5f0e6;
    --card: #ffffff;
    --text: #2c2416;
    --text-light: #6b5d4d;
    --danger: #b33939;
    --success: #2d8a6e;
    --warning: #c9a84c;
    --shadow: 0 4px 20px rgba(44,36,22,0.08);
    --radius: 16px;
    --font-main: 'Tajawal', sans-serif;
    --font-quran: 'Amiri', serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--font-main);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.5s;
  }
  body.custom-bg { background-size: cover; background-position: center; background-attachment: fixed; }
  body.custom-bg::before {
    content:''; position:fixed; inset:0; background: rgba(245,240,230,0.85); z-index:-1;
  }
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn 0.6s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes pulse-soft { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
  @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
  @keyframes typing { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  /* Login */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, #1a3c2f 0%, #2d5a47 50%, #1a3c2f 100%);
    position: relative; overflow: hidden;
  }
  #login-screen::before {
    content:''; position:absolute; inset:0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .login-card {
    background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
    border-radius: var(--radius); padding: 40px; width: 100%; max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; position: relative; z-index: 1;
    border: 2px solid var(--accent);
  }
  .login-logo {
    font-family: var(--font-quran); font-size: 3rem; color: var(--primary);
    margin-bottom: 8px; text-shadow: 2px 2px 0 var(--accent-light);
  }
  .login-sub { color: var(--text-light); font-size: 1rem; margin-bottom: 24px; }
  .input-group { margin-bottom: 16px; text-align: right; }
  .input-group label { display:block; font-weight: 700; margin-bottom: 6px; color: var(--text); font-size: 0.9rem; }
  .input-group input {
    width:100%; padding: 14px 16px; border: 2px solid #e0d5c5; border-radius: 12px;
    font-family: var(--font-main); font-size: 1rem; transition: all 0.3s; background: #faf8f4;
  }
  .input-group input:focus { outline:none; border-color: var(--primary); background: #fff; }
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding: 14px 28px; border: none; border-radius: 12px; font-family: var(--font-main);
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,95,74,0.3); }
  .btn-accent { background: var(--accent); color: var(--text); }
  .btn-accent:hover { background: #d4b55a; transform: translateY(-2px); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 8px 16px; font-size: 0.85rem; }
  .btn-full { width: 100%; }

  /* App Layout */
  #app { display: none; min-height: 100vh; }
  .app-header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .app-header h1 { font-family: var(--font-quran); font-size: 1.6rem; display:flex; align-items:center; gap:10px; }
  .header-actions { display:flex; gap:10px; align-items:center; }
  .header-actions button { background: rgba(255,255,255,0.15); color:#fff; border:none; padding:8px 14px; border-radius:10px; cursor:pointer; font-family:var(--font-main); font-weight:700; transition:0.3s; }
  .header-actions button:hover { background: rgba(255,255,255,0.3); }
  .user-badge { display:flex; align-items:center; gap:8px; background: rgba(255,255,255,0.15); padding:6px 14px; border-radius:20px; font-weight:700; }

  .main-layout { display: flex; min-height: calc(100vh - 64px); }
  .sidebar {
    width: 260px; background: #fff; border-left: 1px solid #e8e0d4; padding: 20px;
    display: flex; flex-direction: column; gap: 8px; overflow-y: auto;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px;
    cursor: pointer; transition: all 0.3s; font-weight: 700; color: var(--text-light);
  }
  .nav-item:hover { background: var(--bg); color: var(--primary); }
  .nav-item.active { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(26,95,74,0.25); }
  .nav-item svg { width: 22px; height: 22px; }

  .content-area { flex: 1; padding: 24px; overflow-y: auto; }
  .page-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; color: var(--primary); display:flex; align-items:center; gap:10px; }

  .card {
    background: var(--card); border-radius: var(--radius); padding: 24px;
    box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid #f0ebe3;
  }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .card-title { font-weight: 800; font-size: 1.15rem; color: var(--primary); }
  .grid-2 { display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .grid-3 { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
  .grid-4 { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }

  /* AI Assistant */
  .ai-panel {
    position: fixed; bottom: 24px; left: 24px; z-index: 90;
    display: flex; flex-direction: column; align-items: flex-start; gap: 12px;
  }
  .ai-avatar-wrap {
    position: relative; cursor: pointer;
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, #2d5a47, #1a3c2f);
    border: 3px solid var(--accent); box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    animation: float 3s ease-in-out infinite;
  }
  .ai-avatar-wrap:hover { transform: scale(1.05); }
  .ai-avatar {
    width: 60px; height: 60px; position: relative;
  }
  .ai-avatar .turban {
    width: 44px; height: 28px; background: #fff; border-radius: 22px 22px 0 0;
    position: absolute; top: 0; left: 8px; border: 2px solid var(--accent);
  }
  .ai-avatar .turban::after {
    content:''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
    width: 28px; height: 8px; background: var(--accent); border-radius: 4px;
  }
  .ai-avatar .face {
    width: 40px; height: 32px; background: #f5d0a9; border-radius: 0 0 20px 20px;
    position: absolute; top: 24px; left: 10px; border: 2px solid #e0b080;
  }
  .ai-avatar .beard {
    width: 36px; height: 14px; background: #2c2416; border-radius: 0 0 18px 18px;
    position: absolute; bottom: 2px; left: 12px;
  }
  .ai-avatar .eye-area {
    width: 100%; height: 10px; position: absolute; top: 30px; left: 0;
    display: flex; justify-content: center; align-items: center; gap: 12px;
  }
  .ai-avatar .eye-closed {
    width: 10px; height: 2px; background: #2c2416; border-radius: 1px;
  }
  .ai-chat-box {
    background: #fff; border-radius: 16px; padding: 16px; width: 320px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15); border: 2px solid var(--accent);
    display: none; flex-direction: column; gap: 10px; max-height: 420px;
  }
  .ai-chat-box.open { display: flex; animation: slideIn 0.3s ease; }
  .ai-chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; max-height: 300px; }
  .ai-msg { padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
  .ai-msg.bot { background: var(--bg); align-self: flex-start; border-bottom-right-radius: 4px; }
  .ai-msg.user { background: var(--primary); color: #fff; align-self: flex-end; border-bottom-left-radius: 4px; }
  .ai-msg.system { background: #fff8e1; color: var(--text); align-self: center; font-size: 0.8rem; border-radius: 8px; }
  .ai-input-wrap { display: flex; gap: 8px; }
  .ai-input-wrap input { flex: 1; padding: 10px 14px; border: 2px solid #e0d5c5; border-radius: 10px; font-family: var(--font-main); }
  .ai-input-wrap button { padding: 10px 14px; }
  .typing-indicator { display: flex; gap: 4px; padding: 8px 12px; }
  .typing-indicator span { width: 8px; height: 8px; background: var(--text-light); border-radius: 50%; animation: typing 1.4s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  /* Tasks / Schedule */
  .schedule-table { width: 100%; border-collapse: collapse; }
  .schedule-table th, .schedule-table td { padding: 14px; text-align: right; border-bottom: 1px solid #f0ebe3; }
  .schedule-table th { background: var(--bg); color: var(--primary); font-weight: 800; font-size: 0.9rem; }
  .schedule-table tr:hover { background: #faf8f4; }
  .task-checkbox { width: 20px; height: 20px; accent-color: var(--primary); cursor: pointer; }
  .task-done { text-decoration: line-through; color: var(--text-light); opacity: 0.6; }
  .category-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
  .cat-religious { background: #e8f5e9; color: #1a5f4a; }
  .cat-study { background: #e3f2fd; color: #1565c0; }
  .cat-sport { background: #fff3e0; color: #e65100; }
  .cat-distractor { background: #ffebee; color: #b33939; }

  /* Stats */
  .stat-circle { width: 120px; height: 120px; border-radius: 50%; border: 8px solid var(--bg); border-top-color: var(--primary); display: flex; align-items: center; justify-content: center; flex-direction: column; margin: 0 auto; position: relative; }
  .stat-circle::after { content: attr(data-label); position: absolute; bottom: -24px; font-size: 0.8rem; font-weight: 700; color: var(--text-light); }
  .stat-num { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
  .progress-bar { height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 5px; transition: width 0.6s ease; }

  /* Group */
  .group-card { background: #fff; border-radius: var(--radius); padding: 20px; border: 2px solid var(--accent-light); }
  .leaderboard-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0ebe3; }
  .leaderboard-rank { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.85rem; }
  .rank-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #fff; }
  .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #fff; }
  .rank-3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
  .rank-other { background: var(--bg); color: var(--text-light); }
  .vote-card { background: #fff8f8; border: 1px solid #ffcdd2; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .share-link-box { background: var(--bg); padding: 12px; border-radius: 10px; font-family: monospace; font-size: 0.85rem; word-break: break-all; border: 1px dashed var(--accent); }

  /* Settings / Customization */
  .color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--text); }
  .bg-option { width: 80px; height: 60px; border-radius: 10px; cursor: pointer; border: 3px solid transparent; background-size: cover; background-position: center; }
  .bg-option.active { border-color: var(--primary); }
  .layout-toggle { display: flex; gap: 12px; }
  .layout-option { padding: 12px 24px; border: 2px solid #e0d5c5; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; }
  .layout-option.active { border-color: var(--primary); background: var(--primary); color: #fff; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: var(--radius); padding: 28px; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal h3 { margin-bottom: 16px; color: var(--primary); }
  .modal-close { float: left; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-light); }

  /* Toast */
  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 12px; font-weight: 700; z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease; }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { width: 100%; position: fixed; bottom: 0; right: 0; left: 0; z-index: 80; flex-direction: row; justify-content: space-around; padding: 8px; border-left: none; border-top: 1px solid #e8e0d4; }
    .nav-item { flex-direction: column; padding: 8px; font-size: 0.75rem; gap: 4px; }
    .nav-item span { display: none; }
    .main-layout { flex-direction: column; padding-bottom: 80px; }
    .content-area { padding: 16px; }
    .ai-panel { bottom: 90px; left: 12px; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }

  .task-row { transition: all 0.3s; }
  .task-row:hover { background: #faf8f4; }
  .streak-flame { color: #e65100; animation: pulse-soft 1.5s infinite; }

  .schedule-horizontal .schedule-table { display: block; }
  .schedule-horizontal .schedule-table thead { display: none; }
  .schedule-horizontal .schedule-table tbody { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 10px; }
  .schedule-horizontal .schedule-table tr { display: flex; flex-direction: column; min-width: 200px; background: #fff; border-radius: 12px; padding: 16px; box-shadow: var(--shadow); border: 1px solid #f0ebe3; }
  .schedule-horizontal .schedule-table td { border: none; padding: 8px 0; }
  .schedule-horizontal .schedule-table td:first-child { font-weight: 800; color: var(--primary); font-size: 1.1rem; border-bottom: 2px solid var(--accent-light); margin-bottom: 8px; padding-bottom: 8px; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card fade-in">
    <div class="login-logo">رتيب</div>
    <div class="login-sub">نظام حياتك اليومي — ديني · دراسي · رياضي</div>
    <div class="input-group">
      <label>اسمك</label>
      <input type="text" id="login-username" placeholder="أدخل اسمك" autocomplete="off">
    </div>
    <div class="input-group">
      <label>اسم مساعدك الذكي</label>
      <input type="text" id="login-ainame" placeholder="مثلاً: الشيخ راتب" autocomplete="off">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" style="margin-top:8px;">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M13.8 12H3"/></svg>
      دخول
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <h1>
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      رتيب
    </h1>
    <div class="header-actions">
      <div class="user-badge">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
        <span id="header-username">—</span>
      </div>
      <button onclick="openSettings()">⚙️ الإعدادات</button>
      <button onclick="doLogout()">خروج</button>
    </div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="nav-item active" onclick="showPage('dashboard')" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>الرئيسية</span>
      </div>
      <div class="nav-item" onclick="showPage('schedule')" data-page="schedule">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span>الجدول اليومي</span>
      </div>
      <div class="nav-item" onclick="showPage('stats')" data-page="stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        <span>الإحصائيات</span>
      </div>
      <div class="nav-item" onclick="showPage('groups')" data-page="groups">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span>مجموعات الأصدقاء</span>
      </div>
      <div class="nav-item" onclick="showPage('settings')" data-page="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>الإعدادات</span>
      </div>
    </div>

    <div class="content-area" id="content-area"></div>
  </div>
</div>

<!-- AI Assistant Panel -->
<div class="ai-panel" id="ai-panel">
  <div class="ai-chat-box" id="ai-chat-box">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f0ebe3; padding-bottom:8px;">
      <strong style="color:var(--primary);" id="ai-chat-title">مساعدك</strong>
      <button onclick="toggleAI()" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">✕</button>
    </div>
    <div class="ai-chat-messages" id="ai-chat-messages"></div>
    <div class="ai-input-wrap">
      <input type="text" id="ai-input" placeholder="قل لي ما تريد..." onkeydown="if(event.key==='Enter')sendAI()">
      <button class="btn btn-primary btn-sm" onclick="sendAI()">إرسال</button>
    </div>
    <div style="font-size:0.75rem;color:var(--text-light);text-align:center;margin-top:6px;border-top:1px solid #f0ebe3;padding-top:6px;">
      جرب: "أضف مهمة" · "اذهب للجدول" · "غيّر اللون للأزرق" · "كم إنجازي"
    </div>
  </div>
  <div class="ai-avatar-wrap" onclick="toggleAI()" title="اضغط للتحدث مع مساعدك">
    <div class="ai-avatar">
      <div class="turban"></div>
      <div class="face">
        <div class="eye-area">
          <div class="eye-closed"></div>
          <div class="eye-closed"></div>
        </div>
      </div>
      <div class="beard"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ===================== STATE =====================
let state = {
  user: null,
  aiName: 'الشيخ راتب',
  tasks: [],
  groups: [],
  currentGroup: null,
  settings: {
    primaryColor: '#1a5f4a',
    accentColor: '#c9a84c',
    bgImage: '',
    layout: 'vertical',
    theme: 'light'
  },
  aiHistory: [],
  streaks: { daily: 0, weekly: 0, monthly: 0 },
  distractors: []
};

const defaultTasks = [
  { id: 1, title: 'صلاة الفجر', category: 'religious', time: '05:30', done: false, date: todayStr() },
  { id: 2, title: 'أذكار الصباح', category: 'religious', time: '06:00', done: false, date: todayStr() },
  { id: 3, title: 'قراءة ورد يومي', category: 'religious', time: '06:30', done: false, date: todayStr() },
  { id: 4, title: 'دراسة / مراجعة', category: 'study', time: '08:00', done: false, date: todayStr() },
  { id: 5, title: 'صلاة الظهر', category: 'religious', time: '12:30', done: false, date: todayStr() },
  { id: 6, title: 'رياضة / تمارين', category: 'sport', time: '16:00', done: false, date: todayStr() },
  { id: 7, title: 'صلاة العصر', category: 'religious', time: '15:30', done: false, date: todayStr() },
  { id: 8, title: 'قراءة كتاب مفيد', category: 'study', time: '19:00', done: false, date: todayStr() },
  { id: 9, title: 'صلاة المغرب', category: 'religious', time: '18:45', done: false, date: todayStr() },
  { id: 10, title: 'صلاة العشاء', category: 'religious', time: '20:15', done: false, date: todayStr() },
  { id: 11, title: 'أذكار المساء', category: 'religious', time: '21:00', done: false, date: todayStr() },
  { id: 12, title: 'تمارين رياضية مسائية', category: 'sport', time: '21:30', done: false, date: todayStr() }
];

const defaultGroups = [
  {
    id: 'g1', name: 'مجموعة التحدي', inviteCode: 'RTB-2026-X7A',
    admin: 'أحمد', members: [
      { name: 'أحمد', points: 145, speed: 92 },
      { name: 'خالد', points: 132, speed: 88 },
      { name: 'سعود', points: 128, speed: 95 },
      { name: 'فهد', points: 98, speed: 70 },
      { name: 'ناصر', points: 85, speed: 65 }
    ],
    tasks: [
      { id: 1, title: 'ختم جزء من القرآن', category: 'religious', deadline: '2026-06-08' },
      { id: 2, title: '30 دقيقة رياضة يومية', category: 'sport', deadline: '2026-06-08' },
      { id: 3, title: 'مراجعة 3 دروس', category: 'study', deadline: '2026-06-09' }
    ],
    punishments: ['غسل أواني المطبخ ليوم كامل', 'شراء قهوة للجميع', 'كتابة 100 سطر من الأذكار', 'تنظيف غرفة المجلس']
  }
];

function todayStr() { return new Date().toISOString().split('T')[0]; }
function loadState() {
  const saved = localStorage.getItem('rateeb_state');
  if (saved) {
    state = JSON.parse(saved);
    if (!state.tasks || state.tasks.length === 0) state.tasks = JSON.parse(JSON.stringify(defaultTasks));
    if (!state.groups || state.groups.length === 0) state.groups = JSON.parse(JSON.stringify(defaultGroups));
  } else {
    state.tasks = JSON.parse(JSON.stringify(defaultTasks));
    state.groups = JSON.parse(JSON.stringify(defaultGroups));
  }
  applySettings();
}
function saveState() { localStorage.setItem('rateeb_state', JSON.stringify(state)); }

function doLogin() {
  const u = document.getElementById('login-username').value.trim();
  const a = document.getElementById('login-ainame').value.trim() || 'الشيخ راتب';
  if (!u) { alert('الرجاء إدخال اسمك'); return; }
  state.user = u; state.aiName = a;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  document.getElementById('header-username').textContent = u;
  document.getElementById('ai-chat-title').textContent = a;
  saveState();
  showPage('dashboard');
  addAIMessage(`السلام عليكم ورحمة الله وبركاته، ${u}! أنا ${a}، مساعدك في رتيب. يمكنك أن تأمرني بأي شيء: أضف مهمة، اذهب للجدول، غيّر اللون، أخبرني بإنجازي... جرّب!`, 'bot');
}
function doLogout() {
  if (!confirm('هل تريد الخروج؟')) return;
  state.user = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-username').value = '';
  document.getElementById('login-ainame').value = '';
}

// ===================== NAVIGATION =====================
function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
  const container = document.getElementById('content-area');
  container.innerHTML = '';
  if (page === 'dashboard') renderDashboard(container);
  else if (page === 'schedule') renderSchedule(container);
  else if (page === 'stats') renderStats(container);
  else if (page === 'groups') renderGroups(container);
  else if (page === 'settings') renderSettings(container);
}

// ===================== DASHBOARD =====================
function renderDashboard(el) {
  const doneToday = state.tasks.filter(t => t.done && t.date === todayStr()).length;
  const totalToday = state.tasks.filter(t => t.date === todayStr()).length;
  const pct = totalToday ? Math.round((doneToday / totalToday) * 100) : 0;
  const nextTask = state.tasks.find(t => !t.done && t.date === todayStr());

  el.innerHTML = `
    <div class="page-title">الرئيسية</div>
    <div class="grid-3">
      <div class="card" style="text-align:center;">
        <div style="font-size:0.9rem;color:var(--text-light);margin-bottom:8px;">إنجاز اليوم</div>
        <div class="stat-circle" data-label="نسبة الإنجاز" style="border-top-color: ${pct > 50 ? 'var(--success)' : 'var(--warning)'};">
          <div class="stat-num">${pct}%</div>
        </div>
        <div style="margin-top:28px;font-size:0.9rem;">${doneToday} من ${totalToday} مهام</div>
      </div>
      <div class="card">
        <div class="card-title">🔥 سلسلة الإنجاز</div>
        <div style="font-size:2.5rem;text-align:center;margin:16px 0;"><span class="streak-flame">🔥</span> ${state.streaks.daily}</div>
        <div style="text-align:center;color:var(--text-light);font-size:0.9rem;">أيام متتالية</div>
      </div>
      <div class="card">
        <div class="card-title">المهمة التالية</div>
        ${nextTask ? `
          <div style="padding:16px;background:var(--bg);border-radius:12px;margin-top:12px;">
            <div style="font-weight:800;color:var(--primary);font-size:1.1rem;">${nextTask.title}</div>
            <div style="color:var(--text-light);margin-top:6px;">⏰ ${nextTask.time}</div>
            <span class="category-badge cat-${nextTask.category}">${catName(nextTask.category)}</span>
          </div>
        ` : '<div style="color:var(--text-light);text-align:center;padding:20px;">🎉 جميع المهام مكتملة!</div>'}
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">📋 نظرة سريعة على اليوم</div>
        <button class="btn btn-sm btn-primary" onclick="showPage('schedule')">عرض الجدول الكامل</button>
      </div>
      <div class="grid-4">
        ${['religious','study','sport'].map(cat => {
          const catTasks = state.tasks.filter(t => t.category === cat && t.date === todayStr());
          const catDone = catTasks.filter(t => t.done).length;
          return `
            <div style="text-align:center;padding:16px;background:var(--bg);border-radius:12px;">
              <div style="font-size:1.3rem;margin-bottom:8px;">${catIcon(cat)}</div>
              <div style="font-weight:800;">${catName(cat)}</div>
              <div style="font-size:1.5rem;font-weight:800;color:var(--primary);margin:8px 0;">${catDone}/${catTasks.length}</div>
              <div class="progress-bar"><div class="progress-fill" style="width:${catTasks.length ? (catDone/catTasks.length)*100 : 0}%"></div></div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">⚠️ ما شتتك اليوم؟</div>
        <button class="btn btn-sm btn-accent" onclick="openAddDistractor()">+ أضف شاغلاً</button>
      </div>
      <div id="distractor-list">
        ${state.distractors.filter(d => d.date === todayStr()).length === 0 ?
          '<div style="color:var(--text-light);text-align:center;">لم تسجل أي شواغل اليوم — بارك الله في تركيزك 🌿</div>' :
          state.distractors.filter(d => d.date === todayStr()).map(d => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:#fff8f8;border-radius:10px;margin-bottom:8px;border-right:4px solid var(--danger);">
              <span>${d.text}</span>
              <span style="font-size:0.8rem;color:var(--text-light);">${d.time}</span>
            </div>
          `).join('')
        }
      </div>
    </div>
  `;
}

function catName(c) { return c==='religious'?'ديني':c==='study'?'دراسي':c==='sport'?'رياضي':'آخر'; }
function catIcon(c) { return c==='religious'?'🕌':c==='study'?'📚':c==='sport'?'💪':'📌'; }

function openAddDistractor() {
  const text = prompt('ما الشيء الذي شتتك أو أعاقك؟');
  if (text) {
    state.distractors.push({ text, date: todayStr(), time: new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'}) });
    saveState(); showPage('dashboard');
  }
}

// ===================== SCHEDULE =====================
function renderSchedule(el) {
  const layoutClass = state.settings.layout === 'horizontal' ? 'schedule-horizontal' : '';
  el.innerHTML = `
    <div class="page-title">الجدول اليومي</div>
    <div class="card ${layoutClass}">
      <div class="card-header">
        <div class="card-title">📅 ${new Date().toLocaleDateString('ar-SA', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}</div>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-sm btn-accent" onclick="openAddTask()">+ مهمة جديدة</button>
          <button class="btn btn-sm btn-primary" onclick="resetDay()">🔄 يوم جديد</button>
        </div>
      </div>
      <table class="schedule-table">
        <thead><tr><th>المهمة</th><th>الوقت</th><th>النوع</th><th>الحالة</th><th></th></tr></thead>
        <tbody>
          ${state.tasks.filter(t => t.date === todayStr()).sort((a,b)=>a.time.localeCompare(b.time)).map(t => `
            <tr class="task-row ${t.done ? 'task-done' : ''}">
              <td><strong>${t.title}</strong></td>
              <td>${t.time}</td>
              <td><span class="category-badge cat-${t.category}">${catName(t.category)}</span></td>
              <td><input type="checkbox" class="task-checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})"></td>
              <td><button class="btn btn-sm btn-danger" onclick="deleteTask(${t.id})">🗑️</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function toggleTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; saveState(); showPage('schedule'); }
}
function deleteTask(id) {
  if (!confirm('حذف المهمة؟')) return;
  state.tasks = state.tasks.filter(x => x.id !== id);
  saveState(); showPage('schedule');
}
function resetDay() {
  if (!confirm('بدء يوم جديد؟ سيتم إعادة تعيين المهام.')) return;
  state.tasks.forEach(t => { if (t.date === todayStr()) t.done = false; });
  const existing = state.tasks.filter(t => t.date === todayStr()).length;
  if (existing === 0) {
    defaultTasks.forEach(dt => {
      state.tasks.push({ ...dt, id: Date.now() + Math.random(), date: todayStr() });
    });
  }
  saveState(); showPage('schedule');
}
function openAddTask() {
  const title = prompt('اسم المهمة:');
  if (!title) return;
  const time = prompt('الوقت (مثال: 14:30):') || '12:00';
  const cat = prompt('النوع (religious/study/sport):') || 'study';
  state.tasks.push({ id: Date.now(), title, time, category: cat, done: false, date: todayStr() });
  saveState(); showPage('schedule');
}

// ===================== STATS =====================
function renderStats(el) {
  const dates = [...new Set(state.tasks.map(t => t.date))].sort();
  const dailyStats = dates.slice(-7).map(d => {
    const dayTasks = state.tasks.filter(t => t.date === d);
    const done = dayTasks.filter(t => t.done).length;
    return { date: d, total: dayTasks.length, done, pct: dayTasks.length ? Math.round((done/dayTasks.length)*100) : 0 };
  });

  const weekly = { total: 0, done: 0 };
  const monthly = { total: 0, done: 0 };
  state.tasks.forEach(t => {
    if (t.done) {
      monthly.done++; monthly.total++;
      if (new Date(t.date) >= new Date(Date.now() - 7*86400000)) { weekly.done++; weekly.total++; }
    } else {
      monthly.total++;
      if (new Date(t.date) >= new Date(Date.now() - 7*86400000)) weekly.total++;
    }
  });

  const topDistractors = {};
  state.distractors.forEach(d => { topDistractors[d.text] = (topDistractors[d.text] || 0) + 1; });
  const sortedDistractors = Object.entries(topDistractors).sort((a,b) => b[1] - a[1]).slice(0, 5);

  el.innerHTML = `
    <div class="page-title">الإحصائيات</div>
    <div class="grid-3">
      <div class="card" style="text-align:center;">
        <div class="card-title">📊 هذا الأسبوع</div>
        <div style="font-size:2.5rem;font-weight:800;color:var(--primary);margin:12px 0;">${weekly.total ? Math.round((weekly.done/weekly.total)*100) : 0}%</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${weekly.total ? (weekly.done/weekly.total)*100 : 0}%"></div></div>
        <div style="margin-top:12px;color:var(--text-light);">${weekly.done} من ${weekly.total} مهام</div>
      </div>
      <div class="card" style="text-align:center;">
        <div class="card-title">📈 هذا الشهر</div>
        <div style="font-size:2.5rem;font-weight:800;color:var(--primary);margin:12px 0;">${monthly.total ? Math.round((monthly.done/monthly.total)*100) : 0}%</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${monthly.total ? (monthly.done/monthly.total)*100 : 0}%"></div></div>
        <div style="margin-top:12px;color:var(--text-light);">${monthly.done} من ${monthly.total} مهام</div>
      </div>
      <div class="card" style="text-align:center;">
        <div class="card-title">🏆 أفضل يوم</div>
        <div style="font-size:1.3rem;font-weight:800;color:var(--accent);margin:16px 0;">
          ${dailyStats.length ? dailyStats.reduce((a,b) => a.pct > b.pct ? a : b).date : '—'}
        </div>
        <div style="color:var(--text-light);">بنسبة ${dailyStats.length ? Math.max(...dailyStats.map(d=>d.pct)) : 0}%</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📅 آخر 7 أيام</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;">
        ${dailyStats.map(d => `
          <div style="flex:1;min-width:100px;text-align:center;padding:16px;background:var(--bg);border-radius:12px;">
            <div style="font-size:0.85rem;color:var(--text-light);margin-bottom:8px;">${d.date}</div>
            <div style="font-size:1.5rem;font-weight:800;color:var(--primary);">${d.pct}%</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${d.pct}%"></div></div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">⚠️ أكثر ما شتتك</div>
        ${sortedDistractors.length === 0 ? '<div style="color:var(--text-light);">لا توجد بيانات كافية</div>' :
          sortedDistractors.map(([text, count]) => `
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0ebe3;">
              <span>${text}</span>
              <span style="font-weight:800;color:var(--danger);">${count} مرات</span>
            </div>
          `).join('')
        }
      </div>
      <div class="card">
        <div class="card-title">✅ توزيع الإنجاز حسب النوع</div>
        ${['religious','study','sport'].map(cat => {
          const catTasks = state.tasks.filter(t => t.category === cat);
          const catDone = catTasks.filter(t => t.done).length;
          const pct = catTasks.length ? Math.round((catDone/catTasks.length)*100) : 0;
          return `
            <div style="margin-bottom:16px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                <span style="font-weight:700;">${catIcon(cat)} ${catName(cat)}</span>
                <span style="font-weight:800;">${pct}%</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// ===================== GROUPS =====================
function renderGroups(el) {
  el.innerHTML = `
    <div class="page-title">مجموعات الأصدقاء</div>
    <div class="grid-2">
      ${state.groups.map(g => `
        <div class="group-card">
          <div class="card-header">
            <div class="card-title">👥 ${g.name}</div>
            <span style="font-size:0.8rem;color:var(--text-light);">المشرف: ${g.admin}</span>
          </div>

          <div style="margin-bottom:16px;">
            <div style="font-weight:700;margin-bottom:8px;color:var(--primary);">📋 مهام المجموعة</div>
            ${g.tasks.map(t => `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px;">
                <span>${t.title}</span>
                <span style="font-size:0.8rem;color:var(--text-light);">⏳ ${t.deadline}</span>
              </div>
            `).join('')}
          </div>

          <div style="margin-bottom:16px;">
            <div style="font-weight:700;margin-bottom:8px;color:var(--primary);">🏆 الصدارة الأسبوعية</div>
            ${g.members.sort((a,b) => b.points - a.points).map((m, i) => `
              <div class="leaderboard-row">
                <div class="leaderboard-rank ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other'}">${i+1}</div>
                <div style="flex:1;">
                  <div style="font-weight:700;">${m.name}</div>
                  <div style="font-size:0.8rem;color:var(--text-light);">⚡ سرعة: ${m.speed}%</div>
                </div>
                <div style="font-weight:800;color:var(--accent);font-size:1.1rem;">${m.points} نقطة</div>
              </div>
            `).join('')}
          </div>

          <div style="margin-bottom:16px;">
            <div style="font-weight:700;margin-bottom:8px;color:var(--danger);">😅 التصويت على العقاب</div>
            <div style="font-size:0.85rem;color:var(--text-light);margin-bottom:10px;">الأقل نقاطاً: <strong>${g.members.sort((a,b)=>a.points-b.points)[0]?.name || '—'}</strong></div>
            ${g.punishments.map((p, idx) => `
              <div class="vote-card" style="display:flex;justify-content:space-between;align-items:center;">
                <span>${p}</span>
                <button class="btn btn-sm btn-accent" onclick="votePunishment('${g.id}', ${idx})">🗳️ تصويت</button>
              </div>
            `).join('')}
          </div>

          <div>
            <div style="font-weight:700;margin-bottom:8px;color:var(--primary);">🔗 رابط الدعوة</div>
            <div class="share-link-box">https://rateeb.app/join/${g.inviteCode}</div>
            <button class="btn btn-sm btn-primary" style="margin-top:8px;" onclick="copyInvite('${g.inviteCode}')">📋 نسخ الرابط</button>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="card" style="text-align:center;">
      <div class="card-title">➕ إنشاء مجموعة جديدة</div>
      <p style="color:var(--text-light);margin:12px 0;">أنشئ مجموعة تحدي مع أصدقائك ونافسوا على الإنجاز!</p>
      <button class="btn btn-primary" onclick="createGroup()">إنشاء مجموعة</button>
    </div>
  `;
}

function votePunishment(gid, idx) {
  alert('✅ تم التصويت! سيتم احتساب الأصوات في نهاية الأسبوع.');
}
function copyInvite(code) {
  navigator.clipboard.writeText(`https://rateeb.app/join/${code}`);
  alert('📋 تم نسخ رابط الدعوة!');
}
function createGroup() {
  const name = prompt('اسم المجموعة:');
  if (!name) return;
  const newGroup = {
    id: 'g' + Date.now(), name, inviteCode: 'RTB-' + Math.random().toString(36).substr(2,6).toUpperCase(),
    admin: state.user, members: [{ name: state.user, points: 0, speed: 0 }],
    tasks: [], punishments: ['غسل الأواني', 'شراء القهوة', 'تنظيف المجلس']
  };
  state.groups.push(newGroup);
  saveState(); showPage('groups');
}

// ===================== SETTINGS =====================
function renderSettings(el) {
  el.innerHTML = `
    <div class="page-title">الإعدادات</div>
    <div class="card">
      <div class="card-title">🎨 لون الموقع الأساسي</div>
      <div class="color-picker" style="margin-top:12px;">
        ${['#1a5f4a','#1565c0','#6a1b9a','#b33939','#e65100','#2e7d32','#5d4037'].map(c => `
          <div class="color-swatch ${state.settings.primaryColor===c?'active':''}" style="background:${c};" onclick="setColor('${c}')"></div>
        `).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-title">🖼️ خلفية الشاشة</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;">
        <div class="bg-option ${state.settings.bgImage===''?'active':''}" style="background:var(--bg);border:2px dashed #ccc;" onclick="setBg('')">
          <div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:0.8rem;color:var(--text-light);">بدون</div>
        </div>
        <div class="bg-option ${state.settings.bgImage==='mosque'?'active':''}" style="background:linear-gradient(135deg,#1a3c2f,#2d5a47);" onclick="setBg('mosque')"></div>
        <div class="bg-option ${state.settings.bgImage==='pattern'?'active':''}" style="background:linear-gradient(45deg,#c9a84c 25%,transparent 25%,transparent 75%,#c9a84c 75%,#c9a84c),linear-gradient(45deg,#c9a84c 25%,transparent 25%,transparent 75%,#c9a84c 75%,#c9a84c);background-size:20px 20px;background-position:0 0,10px 10px;background-color:#f5f0e6;" onclick="setBg('pattern')"></div>
        <div class="bg-option ${state.settings.bgImage==='night'?'active':''}" style="background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);" onclick="setBg('night')"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📐 تخطيط الجدول</div>
      <div class="layout-toggle" style="margin-top:12px;">
        <div class="layout-option ${state.settings.layout==='vertical'?'active':''}" onclick="setLayout('vertical')">📋 عمودي</div>
        <div class="layout-option ${state.settings.layout==='horizontal'?'active':''}" onclick="setLayout('horizontal')">📊 أفقي</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🤖 مساعدك الذكي</div>
      <div class="input-group" style="max-width:400px;">
        <label>اسم المساعد</label>
        <input type="text" id="settings-ainame" value="${state.aiName}" onchange="state.aiName=this.value;document.getElementById('ai-chat-title').textContent=this.value;saveState();">
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔗 رابط مشاركة الموقع</div>
      <p style="color:var(--text-light);font-size:0.9rem;margin-bottom:12px;">شارك رتيب مع أصدقائك لينضموا وينافسوك!</p>
      <div class="share-link-box">https://rateeb.app</div>
      <button class="btn btn-sm btn-primary" style="margin-top:10px;" onclick="copySiteLink()">📋 نسخ رابط الموقع</button>
    </div>

    <div class="card" style="text-align:center;">
      <button class="btn btn-danger" onclick="clearAllData()">🗑️ مسح جميع البيانات</button>
    </div>
  `;
}

function copySiteLink() {
  navigator.clipboard.writeText('https://rateeb.app');
  showToast('✅ تم نسخ رابط الموقع!');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function setColor(c) {
  state.settings.primaryColor = c;
  document.documentElement.style.setProperty('--primary', c);
  saveState(); renderSettings(document.getElementById('content-area'));
}
function setBg(bg) {
  state.settings.bgImage = bg;
  document.body.classList.toggle('custom-bg', bg !== '');
  if (bg === 'mosque') document.body.style.backgroundImage = 'linear-gradient(135deg,#1a3c2f,#2d5a47)';
  else if (bg === 'pattern') document.body.style.backgroundImage = 'linear-gradient(45deg,#c9a84c 25%,transparent 25%,transparent 75%,#c9a84c 75%,#c9a84c),linear-gradient(45deg,#c9a84c 25%,transparent 25%,transparent 75%,#c9a84c 75%,#c9a84c)';
  else if (bg === 'night') document.body.style.backgroundImage = 'linear-gradient(135deg,#0f2027,#203a43,#2c5364)';
  else document.body.style.backgroundImage = '';
  saveState(); renderSettings(document.getElementById('content-area'));
}
function setLayout(l) {
  state.settings.layout = l;
  saveState(); renderSettings(document.getElementById('content-area'));
}
function applySettings() {
  if (state.settings.primaryColor) document.documentElement.style.setProperty('--primary', state.settings.primaryColor);
  setBg(state.settings.bgImage || '');
}
function clearAllData() {
  if (!confirm('هل أنت متأكد من مسح جميع البيانات؟ لا يمكن التراجع!')) return;
  localStorage.removeItem('rateeb_state');
  location.reload();
}

// ===================== AI CHAT + COMMANDS =====================
function toggleAI() {
  document.getElementById('ai-chat-box').classList.toggle('open');
  if (document.getElementById('ai-chat-box').classList.contains('open')) {
    document.getElementById('ai-input').focus();
  }
}
function addAIMessage(text, sender) {
  const box = document.getElementById('ai-chat-messages');
  const div = document.createElement('div');
  div.className = 'ai-msg ' + sender;
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
function showTyping() {
  const box = document.getElementById('ai-chat-messages');
  const div = document.createElement('div');
  div.id = 'typing-indicator';
  div.className = 'ai-msg bot';
  div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function sendAI() {
  const input = document.getElementById('ai-input');
  const text = input.value.trim();
  if (!text) return;
  addAIMessage(text, 'user');
  input.value = '';
  showTyping();
  setTimeout(() => {
    hideTyping();
    const reply = processAICommand(text);
    addAIMessage(reply, 'bot');
  }, 600 + Math.random() * 500);
}

// AI Command Processor
function processAICommand(text) {
  const t = text.toLowerCase();
  const words = t.split(/\s+/);

  // Navigation commands
  if (t.includes('الرئيسية') || t.includes('dashboard') || t.includes('الصفحة الرئيسية')) {
    showPage('dashboard');
    return '✅ انتقلت للصفحة الرئيسية. يمكنك رؤية إنجازك اليوم!';
  }
  if (t.includes('جدول') || t.includes('schedule') || t.includes('مهام') || t.includes('المهام')) {
    showPage('schedule');
    return '✅ هذا جدولك اليومي. لا تنسَ صلاة الفجر! 🕌';
  }
  if (t.includes('إحصائيات') || t.includes('احصائيات') || t.includes('stats') || t.includes('إنجازي') || t.includes('انجازي')) {
    showPage('stats');
    const done = state.tasks.filter(x => x.done && x.date === todayStr()).length;
    const total = state.tasks.filter(x => x.date === todayStr()).length;
    return `✅ هذه إحصائياتك. إنجاز اليوم: ${done} من ${total} مهام (${total ? Math.round(done/total*100) : 0}%). استمر!`;
  }
  if (t.includes('مجموعة') || t.includes('groups') || t.includes('أصدقاء') || t.includes('الاصدقاء')) {
    showPage('groups');
    return '✅ مجموعات الأصدقاء. حان وقت المنافسة! 🏆';
  }
  if (t.includes('إعدادات') || t.includes('اعدادات') || t.includes('settings') || t.includes('اللون') || t.includes('خلفية')) {
    showPage('settings');
    return '✅ إعداداتك. يمكنك تغيير اللون أو الخلفية أو تخطيط الجدول.';
  }

  // Add task
  if ((t.includes('أضف') || t.includes('اضف') || t.includes('جديد') || t.includes('add')) && (t.includes('مهمة') || t.includes('مهمه') || t.includes('task'))) {
    // Try to extract time
    let time = '12:00';
    const timeMatch = text.match(/(\d{1,2}):(\d{2})/);
    if (timeMatch) time = timeMatch[0];
    // Try to extract category
    let cat = 'study';
    if (t.includes('صلاة') || t.includes('قرآن') || t.includes('ذكر') || t.includes('دين') || t.includes('religious')) cat = 'religious';
    else if (t.includes('رياضة') || t.includes('رياضه') || t.includes('جري') || t.includes('sport') || t.includes('تمارين')) cat = 'sport';
    // Extract title - remove command words
    let title = text.replace(/أضف|اضف|مهمة|مهمه|جديد|add|task|الساعة|ساعة|في/g, '').replace(/\d{1,2}:\d{2}/, '').replace(/ديني|دراسي|رياضي|religious|study|sport/, '').trim();
    if (!title) title = 'مهمة جديدة';
    state.tasks.push({ id: Date.now(), title, time, category: cat, done: false, date: todayStr() });
    saveState();
    if (document.querySelector('.nav-item.active')?.dataset.page === 'schedule') showPage('schedule');
    return `✅ أضفت المهمة: "${title}" الساعة ${time} (${catName(cat)}). بارك الله فيك!`;
  }

  // Add distractor
  if ((t.includes('شاغل') || t.includes('شتت') || t.includes('اعاق') || t.includes('distractor')) && (t.includes('أضف') || t.includes('اضف') || t.includes('سجل'))) {
    let what = text.replace(/أضف|اضف|سجل|شاغل|شتت|اعاق|distractor/g, '').trim();
    if (!what) what = 'شيء غير محدد';
    state.distractors.push({ text: what, date: todayStr(), time: new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'}) });
    saveState();
    if (document.querySelector('.nav-item.active')?.dataset.page === 'dashboard') showPage('dashboard');
    return `⚠️ سجلت "${what}" كشاغل. حاول تجنبه في المرة القادمة. استعن بالله!`;
  }

  // Change color
  if (t.includes('لون') || t.includes('color') || t.includes('غير') || t.includes('غيّر')) {
    const colors = {
      'أخضر': '#1a5f4a', 'green': '#1a5f4a',
      'أزرق': '#1565c0', 'blue': '#1565c0',
      'بنفسجي': '#6a1b9a', 'purple': '#6a1b9a',
      'أحمر': '#b33939', 'red': '#b33939',
      'برتقالي': '#e65100', 'orange': '#e65100',
      'أخضر فاتح': '#2e7d32', 'light green': '#2e7d32',
      'بني': '#5d4037', 'brown': '#5d4037'
    };
    for (const [name, hex] of Object.entries(colors)) {
      if (t.includes(name)) {
        state.settings.primaryColor = hex;
        document.documentElement.style.setProperty('--primary', hex);
        saveState();
        return `✅ غيّرت اللون إلى ${name}. يبدو رائعاً! 🎨`;
      }
    }
  }

  // Change background
  if (t.includes('خلفية') || t.includes('background') || t.includes('bg')) {
    if (t.includes('ليل') || t.includes('night') || t.includes('dark')) {
      setBg('night'); return '✅ غيّرت الخلفية للوضع الليلي. 🌙';
    }
    if (t.includes('مسجد') || t.includes('mosque') || t.includes('إسلام') || t.includes('islam')) {
      setBg('mosque'); return '✅ غيّرت الخلفية للنمط الإسلامي. 🕌';
    }
    if (t.includes('نمط') || t.includes('pattern') || t.includes('ذهب')) {
      setBg('pattern'); return '✅ غيّرت الخلفية للنمط الذهبي. ✨';
    }
    if (t.includes('بدون') || t.includes('none') || t.includes('افتراضي')) {
      setBg(''); return '✅ عدت للخلفية الافتراضية.';
    }
  }

  // Change layout
  if (t.includes('عمودي') || t.includes('vertical') || t.includes('عمود')) {
    state.settings.layout = 'vertical'; saveState();
    if (document.querySelector('.nav-item.active')?.dataset.page === 'schedule') showPage('schedule');
    return '✅ غيّرت الجدول للعرض العمودي. 📋';
  }
  if (t.includes('أفقي') || t.includes('horizontal') || t.includes('افقي')) {
    state.settings.layout = 'horizontal'; saveState();
    if (document.querySelector('.nav-item.active')?.dataset.page === 'schedule') showPage('schedule');
    return '✅ غيّرت الجدول للعرض الأفقي. 📊';
  }

  // Create group
  if ((t.includes('أنشئ') || t.includes('انشئ') || t.includes('create')) && (t.includes('مجموعة') || t.includes('مجموعه') || t.includes('group'))) {
    let name = text.replace(/أنشئ|انشئ|create|مجموعة|مجموعه|group/g, '').trim();
    if (!name) name = 'مجموعة ' + state.user;
    const newGroup = {
      id: 'g' + Date.now(), name, inviteCode: 'RTB-' + Math.random().toString(36).substr(2,6).toUpperCase(),
      admin: state.user, members: [{ name: state.user, points: 0, speed: 0 }],
      tasks: [], punishments: ['غسل الأواني', 'شراء القهوة', 'تنظيف المجلس']
    };
    state.groups.push(newGroup); saveState();
    showPage('groups');
    return `✅ أنشأت مجموعة "${name}". رابط الدعوة: https://rateeb.app/join/${newGroup.inviteCode}`;
  }

  // Reset day
  if (t.includes('يوم جديد') || t.includes('reset') || t.includes('جديد') || t.includes('أعد')) {
    resetDay();
    return '✅ بدأت يوماً جديداً! أعاده الله عليك بالبركة. 🌅';
  }

  // Greeting / motivation fallback
  const replies = [
    `بارك الله فيك يا ${state.user || 'صديقي'}! حافظ على صلاة الفجر فهي نورك.`,
    'تذكر: "إن الله لا يضيع أجر من أحسن عملاً" — استمر!',
    'أنصحك ببدء يومك بورد من القرآن، فهو بركة في الوقت.',
    'هل أنجزت مهامك الدراسية اليوم؟ الترتيب يبدأ بالخطوة الأولى.',
    'الرياضة تقوي الجسد والعقل — 30 دقيقة تكفي!',
    'لا تنسَ أذكار الصباح والمساء، فهي درعك الواقي.',
    'إذا شعرت بالتشتت، خذ نفساً عميقاً واستعن بالله.',
    '"الأعمال بالنيات" — اجعل نيتك في كل شيء لله.',
    'يمكنك أن تأمرني بأي شيء! جرب: "أضف مهمة صلاة الضهر الساعة 12:30 ديني" أو "غيّر اللون للأزرق" أو "اذهب للإحصائيات".'
  ];
  return replies[Math.floor(Math.random() * replies.length)];
}
