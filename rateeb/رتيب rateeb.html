<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رِتِّيب — نظام حياتك اليومي</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a5f4a;
    --primary-light: #2d8a6e;
    --accent: #c9a84c;
    --accent-light: #e8d5a3;
    --bg: #f5f0e6;
    --card: #ffffff;
    --text: #2c2416;
    --text-light: #6b5d4d;
    --danger: #b33939;
    --success: #2d8a6e;
    --warning: #c9a84c;
    --shadow: 0 4px 20px rgba(44,36,22,0.08);
    --radius: 16px;
    --font-main: 'Tajawal', sans-serif;
    --font-quran: 'Amiri', serif;
    --sidebar-bg: #ffffff;
    --header-text: #ffffff;
  }
  body.dark-mode {
    --bg: #1a1a2e;
    --card: #16213e;
    --text: #e0e0e0;
    --text-light: #a0a0b0;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
    --sidebar-bg: #0f3460;
    --accent-light: #2d3a5a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--font-main);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s, color 0.4s;
  }
  body.custom-bg { background-size: cover; background-position: center; background-attachment: fixed; }
  body.custom-bg::before { content:''; position:fixed; inset:0; background: rgba(245,240,230,0.85); z-index:-1; }
  body.dark-mode.custom-bg::before { background: rgba(10,10,30,0.85); }
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn 0.6s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes pulse-soft { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
  @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
  @keyframes typing { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  /* Login */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, #1a3c2f 0%, #2d5a47 50%, #1a3c2f 100%);
    position: relative; overflow: hidden;
  }
  #login-screen::before {
    content:''; position:absolute; inset:0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .login-card {
    background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
    border-radius: var(--radius); padding: 40px; width: 100%; max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; position: relative; z-index: 1;
    border: 2px solid var(--accent);
  }
  .login-logo { font-family: var(--font-quran); font-size: 3rem; color: var(--primary); margin-bottom: 8px; text-shadow: 2px 2px 0 var(--accent-light); }
  .login-sub { color: var(--text-light); font-size: 1rem; margin-bottom: 24px; }
  .input-group { margin-bottom: 16px; text-align: right; }
  .input-group label { display:block; font-weight: 700; margin-bottom: 6px; color: var(--text); font-size: 0.9rem; }
  .input-group input, .input-group select {
    width:100%; padding: 14px 16px; border: 2px solid #e0d5c5; border-radius: 12px;
    font-family: var(--font-main); font-size: 1rem; transition: all 0.3s; background: #faf8f4; color: var(--text);
  }
  .input-group input:focus, .input-group select:focus { outline:none; border-color: var(--primary); background: #fff; }
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding: 14px 28px; border: none; border-radius: 12px; font-family: var(--font-main);
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,95,74,0.3); }
  .btn-accent { background: var(--accent); color: var(--text); }
  .btn-accent:hover { background: #d4b55a; transform: translateY(-2px); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 8px 16px; font-size: 0.85rem; }
  .btn-full { width: 100%; }

  /* App Layout */
  #app { display: none; min-height: 100vh; }
  .app-header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .app-header h1 { font-family: var(--font-quran); font-size: 1.6rem; display:flex; align-items:center; gap:10px; }
  .header-actions { display:flex; gap:10px; align-items:center; }
  .header-actions button { background: rgba(255,255,255,0.15); color:#fff; border:none; padding:8px 14px; border-radius:10px; cursor:pointer; font-family:var(--font-main); font-weight:700; transition:0.3s; }
  .header-actions button:hover { background: rgba(255,255,255,0.3); }
  .user-badge { display:flex; align-items:center; gap:8px; background: rgba(255,255,255,0.15); padding:6px 14px; border-radius:20px; font-weight:700; }

  .main-layout { display: flex; min-height: calc(100vh - 64px); }
  .sidebar {
    width: 260px; background: var(--sidebar-bg); border-left: 1px solid #e8e0d4; padding: 20px;
    display: flex; flex-direction: column; gap: 8px; overflow-y: auto; transition: background 0.4s;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px;
    cursor: pointer; transition: all 0.3s; font-weight: 700; color: var(--text-light);
  }
  .nav-item:hover { background: var(--bg); color: var(--primary); }
  .nav-item.active { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(26,95,74,0.25); }
  .nav-item svg { width: 22px; height: 22px; }

  .content-area { flex: 1; padding: 24px; overflow-y: auto; }
  .page-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; color: var(--primary); display:flex; align-items:center; gap:10px; }

  .card {
    background: var(--card); border-radius: var(--radius); padding: 24px;
    box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid rgba(240,235,227,0.5);
    transition: background 0.4s;
  }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .card-title { font-weight: 800; font-size: 1.15rem; color: var(--primary); }
  .grid-2 { display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .grid-3 { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
  .grid-4 { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }

  /* AI Assistant */
  .ai-panel { position: fixed; bottom: 24px; left: 24px; z-index: 90; display: flex; flex-direction: column; align-items: flex-start; gap: 12px; }
  .ai-avatar-wrap {
    position: relative; cursor: pointer; width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, #2d5a47, #1a3c2f); border: 3px solid var(--accent);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center;
    animation: float 3s ease-in-out infinite;
  }
  .ai-avatar-wrap:hover { transform: scale(1.05); }
  .ai-avatar { width: 60px; height: 60px; position: relative; }
  .ai-avatar .turban { width: 44px; height: 28px; background: #fff; border-radius: 22px 22px 0 0; position: absolute; top: 0; left: 8px; border: 2px solid var(--accent); }
  .ai-avatar .turban::after { content:''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); width: 28px; height: 8px; background: var(--accent); border-radius: 4px; }
  .ai-avatar .face { width: 40px; height: 32px; background: #f5d0a9; border-radius: 0 0 20px 20px; position: absolute; top: 24px; left: 10px; border: 2px solid #e0b080; }
  .ai-avatar .beard { width: 36px; height: 14px; background: #2c2416; border-radius: 0 0 18px 18px; position: absolute; bottom: 2px; left: 12px; }
  .ai-avatar .eye-area { width: 100%; height: 10px; position: absolute; top: 30px; left: 0; display: flex; justify-content: center; align-items: center; gap: 12px; }
  .ai-avatar .eye-closed { width: 10px; height: 2px; background: #2c2416; border-radius: 1px; }
  .ai-chat-box {
    background: var(--card); border-radius: 16px; padding: 16px; width: 320px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15); border: 2px solid var(--accent);
    display: none; flex-direction: column; gap: 10px; max-height: 420px;
  }
  .ai-chat-box.open { display: flex; animation: slideIn 0.3s ease; }
  .ai-chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; max-height: 300px; }
  .ai-msg { padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
  .ai-msg.bot { background: var(--bg); align-self: flex-start; border-bottom-right-radius: 4px; color: var(--text); }
  .ai-msg.user { background: var(--primary); color: #fff; align-self: flex-end; border-bottom-left-radius: 4px; }
  .ai-msg.system { background: #fff8e1; color: var(--text); align-self: center; font-size: 0.8rem; border-radius: 8px; }
  .ai-input-wrap { display: flex; gap: 8px; }
  .ai-input-wrap input { flex: 1; padding: 10px 14px; border: 2px solid #e0d5c5; border-radius: 10px; font-family: var(--font-main); background: var(--card); color: var(--text); }
  .ai-input-wrap button { padding: 10px 14px; }
  .typing-indicator { display: flex; gap: 4px; padding: 8px 12px; }
  .typing-indicator span { width: 8px; height: 8px; background: var(--text-light); border-radius: 50%; animation: typing 1.4s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  /* Tasks / Schedule */
  .schedule-table { width: 100%; border-collapse: collapse; }
  .schedule-table th, .schedule-table td { padding: 14px; text-align: right; border-bottom: 1px solid rgba(240,235,227,0.5); color: var(--text); }
  .schedule-table th { background: var(--bg); color: var(--primary); font-weight: 800; font-size: 0.9rem; }
  .schedule-table tr:hover { background: var(--bg); }
  .task-checkbox { width: 20px; height: 20px; accent-color: var(--primary); cursor: pointer; }
  .task-done { text-decoration: line-through; color: var(--text-light); opacity: 0.6; }
  .category-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
  .cat-religious { background: #e8f5e9; color: #1a5f4a; }
  .cat-study { background: #e3f2fd; color: #1565c0; }
  .cat-sport { background: #fff3e0; color: #e65100; }
  .cat-social { background: #f3e5f5; color: #7b1fa2; }
  .cat-moral { background: #fce4ec; color: #c62828; }
  .cat-distractor { background: #ffebee; color: #b33939; }

  /* Stats */
  .stat-circle { width: 120px; height: 120px; border-radius: 50%; border: 8px solid var(--bg); border-top-color: var(--primary); display: flex; align-items: center; justify-content: center; flex-direction: column; margin: 0 auto; position: relative; }
  .stat-circle::after { content: attr(data-label); position: absolute; bottom: -24px; font-size: 0.8rem; font-weight: 700; color: var(--text-light); }
  .stat-num { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
  .progress-bar { height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 5px; transition: width 0.6s ease; }

  /* Group */
  .group-card { background: var(--card); border-radius: var(--radius); padding: 20px; border: 2px solid var(--accent-light); margin-bottom: 20px; }
  .leaderboard-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(240,235,227,0.5); }
  .leaderboard-rank { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.85rem; }
  .rank-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #fff; }
  .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #fff; }
  .rank-3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
  .rank-other { background: var(--bg); color: var(--text-light); }
  .vote-card { background: var(--bg); border: 1px solid rgba(255,205,210,0.5); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .share-link-box { background: var(--bg); padding: 12px; border-radius: 10px; font-family: monospace; font-size: 0.85rem; word-break: break-all; border: 1px dashed var(--accent); color: var(--text); }
  .challenge-link-box { background: linear-gradient(135deg, #1a3c2f, #2d5a47); padding: 14px 18px; border-radius: 12px; font-family: monospace; font-size: 0.85rem; word-break: break-all; border: 2px solid var(--accent); color: #fff; margin-top: 10px; }

  /* World Ranking */
  .world-rank-badge { display:inline-flex; align-items:center; gap:6px; background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a1a1a; padding: 6px 14px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; }

  /* Settings */
  .color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--text); }
  .bg-option { width: 80px; height: 60px; border-radius: 10px; cursor: pointer; border: 3px solid transparent; background-size: cover; background-position: center; }
  .bg-option.active { border-color: var(--primary); }
  .layout-toggle { display: flex; gap: 12px; }
  .layout-option { padding: 12px 24px; border: 2px solid #e0d5c5; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; color: var(--text); }
  .layout-option.active { border-color: var(--primary); background: var(--primary); color: #fff; }
  .toggle-switch { position: relative; display: inline-block; width: 52px; height: 28px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 28px; transition: .4s; }
  .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; right: 4px; bottom: 4px; background: white; border-radius: 50%; transition: .4s; }
  input:checked + .toggle-slider { background: var(--primary); }
  input:checked + .toggle-slider:before { transform: translateX(-24px); }
  .developer-card { background: linear-gradient(135deg, #1a3c2f, #2d5a47); color: #fff; border-radius: var(--radius); padding: 24px; margin-bottom: 20px; text-align: center; }
  .developer-name { font-family: var(--font-quran); font-size: 1.4rem; color: var(--accent); margin-bottom: 6px; }
  .developer-date { font-size: 0.9rem; color: rgba(255,255,255,0.7); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: var(--radius); padding: 28px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); color: var(--text); }
  .modal h3 { margin-bottom: 16px; color: var(--primary); }
  .modal-close { float: left; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-light); }

  /* Toast */
  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 12px; font-weight: 700; z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease; }

  /* Competition Banner */
  .competition-banner { background: linear-gradient(135deg, #b33939, #e65100); color: #fff; border-radius: var(--radius); padding: 20px 24px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
  .competition-banner h3 { font-size: 1.2rem; margin-bottom: 4px; }
  .competition-timer { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 10px; font-weight: 800; font-size: 1.1rem; }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { width: 100%; position: fixed; bottom: 0; right: 0; left: 0; z-index: 80; flex-direction: row; justify-content: space-around; padding: 8px; border-left: none; border-top: 1px solid #e8e0d4; }
    .nav-item { flex-direction: column; padding: 8px; font-size: 0.75rem; gap: 4px; }
    .nav-item span { display: none; }
    .main-layout { flex-direction: column; padding-bottom: 80px; }
    .content-area { padding: 16px; }
    .ai-panel { bottom: 90px; left: 12px; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }
  .task-row { transition: all 0.3s; }
  .task-row:hover { background: var(--bg); }
  .streak-flame { color: #e65100; animation: pulse-soft 1.5s infinite; }
  .schedule-horizontal .schedule-table { display: block; }
  .schedule-horizontal .schedule-table thead { display: none; }
  .schedule-horizontal .schedule-table tbody { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 10px; }
  .schedule-horizontal .schedule-table tr { display: flex; flex-direction: column; min-width: 200px; background: var(--card); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); border: 1px solid rgba(240,235,227,0.5); }
  .schedule-horizontal .schedule-table td { border: none; padding: 8px 0; }
  .schedule-horizontal .schedule-table td:first-child { font-weight: 800; color: var(--primary); font-size: 1.1rem; border-bottom: 2px solid var(--accent-light); margin-bottom: 8px; padding-bottom: 8px; }

  /* Social buttons */
  .social-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: var(--font-main); font-size: 0.95rem; font-weight: 700;
    border-radius: 12px; padding: 12px 20px; cursor: pointer; transition: all 0.3s;
  }
  .social-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.15); }

  /* Lang select */
  .lang-btn { padding: 8px 16px; border: 2px solid var(--accent); border-radius: 10px; cursor: pointer; font-weight: 700; background: transparent; color: var(--text); transition: 0.3s; }
  .lang-btn.active { background: var(--accent); color: #fff; }

  /* Points badge */
  .points-badge { display: inline-block; background: linear-gradient(135deg, var(--accent), #d4b55a); color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card fade-in" id="register-card">
    <div class="login-logo">رِتِّيب</div>
    <div class="login-sub">إنشاء حساب جديد</div>

    <!-- Social signup buttons -->
    <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;">
      <button class="btn btn-full social-btn" onclick="socialAuth('google')" style="background:#fff; color:#3c4043; border:2px solid #dadce0;">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-3.58-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        المتابعة بـ Google

function loadState() {
  const saved = localStorage.getItem('rateeb_state_v2');
  if (saved) {
    state = { ...state, ...JSON.parse(saved) };
    if (!state.tasks || state.tasks.length === 0) state.tasks = JSON.parse(JSON.stringify(defaultTasks));
    if (!state.groups) state.groups = [];
    if (!state.settings) state.settings = { primaryColor: '#1a5f4a', bgImage: '', layout: 'vertical', theme: 'light', lang: 'ar' };
    if (!state.settings.lang) state.settings.lang = 'ar';
  } else {

  }
  applySettings();
  applyLang();
}

function getAccounts() {

function switchToLogin() {
  document.getElementById('register-card').classList.add('hidden');
  document.getElementById('signin-card').classList.remove('hidden');
}
function switchToRegister() {
  document.getElementById('signin-card').classList.add('hidden');
  document.getElementById('register-card').classList.remove('hidden');
}

function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const ainame   = document.getElementById('reg-ainame').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;

  if (!username) { alert('الرجاء إدخال اسم المستخدم'); return; }
  if (!ainame)   { alert('الرجاء إدخال اسم الشيخ'); return; }
  if (!email)    { alert('الرجاء إدخال البريد الإلكتروني'); return; }
  if (!password) { alert('الرجاء إدخال كلمة المرور'); return; }

  const accounts = getAccounts();

  // اسم المستخدم يجب أن يكون فريداً
  for (const key in accounts) {
    if (accounts[key].username.toLowerCase() === username.toLowerCase()) {
      alert('اسم المستخدم هذا مأخوذ، الرجاء اختيار اسم آخر'); return;
    }
  }
  // البريد الإلكتروني لا يمكن تكراره
  if (accounts[email]) {
    alert('هذا البريد الإلكتروني مسجل بالفعل، جرّب تسجيل الدخول'); return;
  }

  accounts[email] = { username, ainame, password };
  saveAccounts(accounts);

  enterApp(username, ainame);
}

function doSignIn() {
  const email    = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;

  if (!email)    { alert('الرجاء إدخال البريد الإلكتروني'); return; }
  if (!password) { alert('الرجاء إدخال كلمة المرور'); return; }

  const accounts = getAccounts();
  const account  = accounts[email];

  if (!account || account.password !== password) {
    alert('البريد الإلكتروني أو كلمة المرور غير صحيحة'); return;
  }

  enterApp(account.username, account.ainame);
}

function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
  const container = document.getElementById('content-area');
  container.innerHTML = '';
  if (page === 'dashboard') renderDashboard(container);
  else if (page === 'schedule') renderSchedule(container);
  else if (page === 'stats') renderStats(container);
  else if (page === 'groups') renderGroups(container);
  else if (page === 'settings') renderSettings(container);
}

function renderStats(el) {

    const done = dayTasks.filter(t => t.done).length;
    return { date: d, total: dayTasks.length, done, pct: dayTasks.length ? Math.round((done/dayTasks.length)*100) : 0 };

  const weekly = { total: 0, done: 0 };
  const monthly = { total: 0, done: 0 };
  state.tasks.forEach(t => {
    if (t.done) {
      monthly.done++; monthly.total++;
      if (new Date(t.date) >= new Date(Date.now() - 7*86400000)) { weekly.done++; weekly.total++; }
    } else {
      monthly.total++;

        <div class="progress-bar"><div class="progress-fill" style="width:${monthly.total ? (monthly.done/monthly.total)*100 : 0}%"></div></div>
        <div style="margin-top:12px;color:var(--text-light);">${monthly.done} من ${monthly.total} مهام</div>
      </div>
      <div class="card" style="text-align:center;">

function calcGroupScore(g) {
  const totalPoints = g.members.reduce((s, m) => s + (m.points||0), 0);
  const memberBonus = (g.members.length || 1) * 10;
  return totalPoints + memberBonus + (g.globalBonus || 0);
}

function renderChallengeBanner() {
  // Pick 2 random groups for challenge
  if (state.groups.length < 2) return '';
  if (!state.monthlyChallenge) {
    const shuffled = [...state.groups].sort(() => Math.random() - 0.5);
    state.monthlyChallenge = { g1: shuffled[0].id, g2: shuffled[1].id, started: todayStr() };
    saveState();
  }
  const mc = state.monthlyChallenge;
  const g1 = state.groups.find(g => g.id === mc.g1);
  const g2 = state.groups.find(g => g.id === mc.g2);
  if (!g1 || !g2) return '';

  const isMyGroupAdmin = (g1.admin === state.user || g2.admin === state.user);
  const myG = g1.admin === state.user ? g1 : (g2.admin === state.user ? g2 : null);
  const oppG = myG === g1 ? g2 : g1;

  // Balance logic: larger group admin selects participants
  let balanceNote = '';
  if (myG && myG.members.length !== oppG.members.length) {
    const larger = myG.members.length > oppG.members.length ? myG : oppG;
    const smaller = larger === myG ? oppG : myG;
    if (larger.admin === state.user) {
      balanceNote = `<div style="background:rgba(255,255,255,0.2);padding:10px 14px;border-radius:10px;margin-top:10px;font-size:0.9rem;">
        ⚠️ مجموعتك أكبر (${larger.members.length} vs ${smaller.members.length}). يجب أن تختار <strong>${smaller.members.length} أعضاء</strong> فقط للمنافسة.
        <button class="btn btn-sm" style="background:var(--accent);color:#222;margin-right:10px;" onclick="openSelectParticipants('${larger.id}', ${smaller.members.length})">اختيار المشاركين</button>
      </div>`;
    }
  }

  const challengeLink = `https://rateeb.app/challenge/${mc.g1}-vs-${mc.g2}`;

  return `
    <div class="competition-banner">
      <div>
        <h3>⚔️ التحدي الشهري</h3>
        <div style="font-size:0.9rem;opacity:0.9;">${g1.name} ضد ${g2.name}</div>
        <div style="font-size:0.85rem;margin-top:4px;opacity:0.8;">📅 يبدأ في نهاية الشهر</div>
        ${balanceNote}
        ${isMyGroupAdmin ? `
          <div style="margin-top:10px;">
            <div style="font-size:0.85rem;opacity:0.85;margin-bottom:6px;">🔗 رابط التحدي — أرسله لمجموعة الخصم:</div>
            <div class="challenge-link-box">${challengeLink}</div>
            <button class="btn btn-sm" style="background:var(--accent);color:#222;margin-top:8px;" onclick="copyChallengeLink('${challengeLink}')">📋 نسخ الرابط</button>
          </div>
        ` : ''}
      </div>
      <div class="competition-timer">🏆 ${g1.name} vs ${g2.name}</div>
    </div>
  `;
}

function copyChallengeLink(link) {
  navigator.clipboard.writeText(link);
  showToast('✅ تم نسخ رابط التحدي!');
}

function openSelectParticipants(groupId, count) {
  const g = state.groups.find(x => x.id === groupId);
  if (!g) return;
  openModal(`
    <h3>🎯 اختر ${count} أعضاء للتنافس</h3>
    <p style="color:var(--text-light);margin-bottom:16px;">اختر بالضبط ${count} عضو من مجموعتك للمنافسة.</p>
    <div id="participant-checkboxes">
      ${g.members.map(m => `
        <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:10px;margin-bottom:8px;">
          <input type="checkbox" id="p-${m.name}" value="${m.name}" onchange="limitParticipants(${count})">
          <label for="p-${m.name}" style="cursor:pointer;">${m.name} — ${m.points} نقطة</label>
        </div>`).join('')}
    </div>
    <button class="btn btn-primary btn-full" onclick="confirmParticipants('${groupId}', ${count})">تأكيد الاختيار</button>
  `);
}

function limitParticipants(max) {
  const checked = document.querySelectorAll('#participant-checkboxes input:checked');
  if (checked.length > max) {
    checked[checked.length-1].checked = false;
    showToast(`⚠️ يمكنك اختيار ${max} فقط!`);
  }
}

function confirmParticipants(groupId, count) {
  const checked = [...document.querySelectorAll('#participant-checkboxes input:checked')].map(el => el.value);
  if (checked.length !== count) { showToast(`يجب اختيار ${count} بالضبط`); return; }
  if (!state.monthlyChallenge) state.monthlyChallenge = {};
  state.monthlyChallenge.selectedParticipants = state.monthlyChallenge.selectedParticipants || {};
  state.monthlyChallenge.selectedParticipants[groupId] = checked;
  saveState(); closeModal();
  showToast('✅ تم اختيار المشاركين!');
}

function renderGlobalRanking() {
  // Sort groups by score
  const ranked = [...state.groups].map(g => ({
    ...g, score: calcGroupScore(g)
  })).sort((a,b) => b.score - a.score);
  // Update world rank
  ranked.forEach((g, i) => {
    const orig = state.groups.find(x => x.id === g.id);
    if (orig) orig.worldRank = i + 1;
  });

  if (ranked.length === 0) return '';

  return `
    <div class="card">
      <div class="card-title">🌍 التصنيف العالمي (يتحدث أسبوعياً)</div>
      <p style="color:var(--text-light);font-size:0.85rem;margin-bottom:16px;">الترتيب بناءً على مجموع النقاط وعدد الأعضاء</p>
      ${ranked.map((g, i) => `
        <div class="leaderboard-row">
          <div class="leaderboard-rank ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other'}">${i+1}</div>
          <div style="flex:1;">
            <div style="font-weight:700;">${g.name}</div>
            <div style="font-size:0.8rem;color:var(--text-light);">${g.members.length} أعضاء</div>
          </div>
          <div style="font-weight:800;color:var(--accent);">${g.score} نقطة</div>
        </div>`).join('')}
    </div>
  `;
}

function openCreateGroup() {
  openModal(`
    <h3>➕ إنشاء مجموعة جديدة</h3>
    <p style="color:var(--text-light);margin-bottom:16px;">ستكون المشرف وتتحكم في المهام والعقوبات.</p>
    <div class="input-group"><label>اسم المجموعة</label><input type="text" id="ng-name" placeholder="اسم المجموعة"></div>
    <div class="input-group"><label>عدد الأشخاص المعاقبين أسبوعياً/شهرياً</label>
      <select id="ng-punishcount">
        <option value="1">1 شخص</option>
        <option value="2">2 أشخاص</option>
        <option value="3">3 أشخاص</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="confirmCreateGroup()">إنشاء</button>
  `);
}

function confirmCreateGroup() {
  const name = document.getElementById('ng-name').value.trim();
  if (!name) { alert('أدخل اسم المجموعة'); return; }
  const punishCount = parseInt(document.getElementById('ng-punishcount').value) || 1;
  const code = 'RTB-' + Math.random().toString(36).substr(2,6).toUpperCase();
  const newGroup = {
    id: 'g' + Date.now(), name,
    inviteCode: code,
    admin: state.user,
    members: [{ name: state.user, points: 0, weeklyPoints: 0 }],
    tasks: [],
    punishments: [],
    punishCount,
    globalBonus: 0,
    worldRank: null
  };
  state.groups.push(newGroup);
  saveState(); closeModal(); showPage('groups');
  showToast(`✅ تم إنشاء "${name}"! أنت المشرف الآن.`);
}

function openAddGroupTask(gid) {
  const cats = ['religious','study','sport','social','moral'];
  openModal(`
    <h3>📋 إضافة مهمة للمجموعة</h3>
    <div class="input-group"><label>عنوان المهمة</label><input type="text" id="gt-title" placeholder="عنوان المهمة"></div>
    <div class="input-group"><label>الجانب</label>
      <select id="gt-cat">${cats.map(c=>`<option value="${c}">${catIcon(c)} ${catName(c)}</option>`).join('')}</select>
    </div>
    <div class="input-group"><label>النقاط (1-5)</label>
      <select id="gt-points">
        <option value="1">1 نقطة</option>
        <option value="2">2 نقاط</option>
        <option value="3">3 نقاط</option>
        <option value="4">4 نقاط</option>
        <option value="5">5 نقاط (الحد الأقصى)</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="confirmAddGroupTask('${gid}')">إضافة المهمة</button>
  `);
}

function confirmAddGroupTask(gid) {
  const g = state.groups.find(x => x.id === gid);
  if (!g) return;
  const title = document.getElementById('gt-title').value.trim();
  const cat = document.getElementById('gt-cat').value;
  const points = parseInt(document.getElementById('gt-points').value) || 1;
  if (!title) { alert('أدخل عنوان المهمة'); return; }
  if (!g.tasks) g.tasks = [];
  g.tasks.push({ id: Date.now(), title, category: cat, points, completedBy: [] });
  saveState(); closeModal(); showPage('groups');
}

function deleteGroupTask(gid, tid) {
  const g = state.groups.find(x => x.id === gid);
  if (!g) return;
  g.tasks = g.tasks.filter(t => t.id !== tid);
  saveState(); showPage('groups');
}

function completeGroupTask(gid, tid) {
  const g = state.groups.find(x => x.id === gid);
  if (!g) return;
  const task = g.tasks.find(t => t.id === tid);
  if (!task) return;
  if (task.completedBy && task.completedBy.includes(state.user)) {
    showToast('⚠️ أنجزت هذه المهمة مسبقاً!'); return;
  }
  if (!task.completedBy) task.completedBy = [];
  task.completedBy.push(state.user);
  const member = g.members.find(m => m.name === state.user);
  if (member) {
    member.points = (member.points || 0) + task.points;
    member.weeklyPoints = (member.weeklyPoints || 0) + task.points;
  }
  saveState(); showPage('groups');
  showToast(`✅ أنجزت "${task.title}" وحصلت على ${task.points} نقاط!`);
}

function openManagePunishments(gid) {
  const g = state.groups.find(x => x.id === gid);
  if (!g) return;
  openModal(`
    <h3>⚙️ إدارة العقوبات — ${g.name}</h3>
    <div class="input-group"><label>عقوبة جديدة</label>
      <input type="text" id="new-punishment" placeholder="مثال: غسل الأواني لأسبوع">
    </div>
    <button class="btn btn-accent btn-full" onclick="addPunishment('${gid}')">+ إضافة عقوبة</button>
    <div style="margin-top:16px;">
      ${(g.punishments || []).map((p, idx) => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg);border-radius:10px;margin-bottom:8px;">
          <span>${p.text || p}</span>
          <button class="btn btn-sm btn-danger" onclick="removePunishment('${gid}', ${idx})">🗑️</button>
        </div>`).join('')}
    </div>
  `);
}

function addPunishment(gid) {
  const g = state.groups.find(x => x.id === gid);
  if (!g) return;
  const txt = document.getElementById('new-punishment').value.trim();
  if (!txt) return;
  if (!g.punishments) g.punishments = [];
  g.punishments.push({ text: txt, votes: 0 });
  saveState(); openManagePunishments(gid);
}

function removePunishment(gid, idx) {
  const g = state.groups.find(x => x.id === gid);
  if (!g || !g.punishments) return;
  g.punishments.splice(idx, 1);
  saveState(); openManagePunishments(gid);
}

function votePunishment(gid, idx) {
  const g = state.groups.find(x => x.id === gid);
  if (!g || !g.punishments || !g.punishments[idx]) return;
  if (typeof g.punishments[idx] === 'string') g.punishments[idx] = { text: g.punishments[idx], votes: 0 };
  g.punishments[idx].votes = (g.punishments[idx].votes || 0) + 1;
  saveState(); showToast('✅ تم تسجيل تصويتك!'); showPage('groups');
}

function openPunishSettings(gid) {
  const g = state.groups.find(x => x.id === gid);
  if (!g) return;
  openModal(`
    <h3>⚙️ إعدادات العقاب</h3>
    <div class="input-group">
      <label>عدد الأشخاص المعاقبين أسبوعياً/شهرياً</label>
      <select id="punish-count-sel">
        ${[1,2,3,4,5].map(n=>`<option value="${n}" ${g.punishCount===n?'selected':''}>${n} ${n===1?'شخص':'أشخاص'}</option>`).join('')}
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="savePunishCount('${gid}')">حفظ</button>
  `);
}

function savePunishCount(gid) {
  const g = state.groups.find(x => x.id === gid);
  if (!g) return;
  g.punishCount = parseInt(document.getElementById('punish-count-sel').value) || 1;
  saveState(); closeModal(); showPage('groups');
}

function openAddMember(gid) {
  openModal(`
    <h3>➕ إضافة عضو</h3>
    <div class="input-group"><label>اسم العضو</label><input type="text" id="new-member-name" placeholder="اسم العضو"></div>
    <button class="btn btn-primary btn-full" onclick="confirmAddMember('${gid}')">إضافة</button>
  `);
}

function confirmAddMember(gid) {
  const g = state.groups.find(x => x.id === gid);
  if (!g) return;
  const name = document.getElementById('new-member-name').value.trim();
  if (!name) return;
  if (g.members.some(m => m.name === name)) { showToast('العضو موجود مسبقاً'); return; }
  g.members.push({ name, points: 0, weeklyPoints: 0 });
  saveState(); closeModal(); showPage('groups');
}

function copyInvite(code) {
  navigator.clipboard.writeText(code);
  showToast('📋 تم نسخ كود الدعوة!');
}

        <div class="layout-option ${state.settings.layout==='horizontal'?'active':''}" onclick="setLayout('horizontal')">📊 أفقي</div>
      </div>
    </div>

    <!-- AI NAME -->
    <div class="card">
      <div class="card-title">🤖 مساعدك الذكي</div>
      <div class="input-group" style="max-width:400px;">
        <label>اسم المساعد</label>
        <input type="text" id="settings-ainame" value="${state.aiName}" onchange="state.aiName=this.value;document.getElementById('ai-chat-title').textContent=this.value;saveState();">
      </div>
    </div>

    <!-- DANGER -->
    <div class="card" style="text-align:center;">
      <button class="btn btn-danger" onclick="clearAllData()">🗑️ مسح جميع البيانات</button>
    </div>
  `;
}

function toggleDarkMode(on) {
  state.settings.theme = on ? 'dark' : 'light';
  document.body.classList.toggle('dark-mode', on);
  saveState();
}

function setLang(lang) {
  state.settings.lang = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  saveState(); applyLang();
  showPage('settings');
}

function setColor(c) {
  state.settings.primaryColor = c;
  document.documentElement.style.setProperty('--primary', c);
  saveState(); renderSettings(document.getElementById('content-area'));
}
function setBg(bg) {
  state.settings.bgImage = bg;
  document.body.classList.toggle('custom-bg', bg !== '');
  if (bg === 'mosque') document.body.style.backgroundImage = 'linear-gradient(135deg,#1a3c2f,#2d5a47)';
  else if (bg === 'pattern') document.body.style.backgroundImage = 'repeating-linear-gradient(45deg,#c9a84c,#c9a84c 5px,#f5f0e6 5px,#f5f0e6 25px)';
  else if (bg === 'night') document.body.style.backgroundImage = 'linear-gradient(135deg,#0f2027,#203a43,#2c5364)';
  else document.body.style.backgroundImage = '';
  saveState(); renderSettings(document.getElementById('content-area'));
}
function setLayout(l) {
  state.settings.layout = l;
  saveState(); renderSettings(document.getElementById('content-area'));
}
function applySettings() {
  if (state.settings.primaryColor) document.documentElement.style.setProperty('--primary', state.settings.primaryColor);
  if (state.settings.theme === 'dark') document.body.classList.add('dark-mode');
  setBg(state.settings.bgImage || '');
}
function clearAllData() {
  if (!confirm('هل أنت متأكد من مسح جميع البيانات؟')) return;
  localStorage.removeItem('rateeb_state_v2');
  location.reload();
}
function openSettings() { showPage('settings'); }

// ===================== AI CHAT =====================
function toggleAI() {
  document.getElementById('ai-chat-box').classList.toggle('open');
  if (document.getElementById('ai-chat-box').classList.contains('open')) {
    document.getElementById('ai-input').focus();
  }
}
function addAIMessage(text, sender) {
  const box = document.getElementById('ai-chat-messages');
  const div = document.createElement('div');
  div.className = 'ai-msg ' + sender;
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
function showTyping() {
  const box = document.getElementById('ai-chat-messages');
  const div = document.createElement('div');
  div.id = 'typing-indicator'; div.className = 'ai-msg bot';
  div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  box.appendChild(div); box.scrollTop = box.scrollHeight;
}
function hideTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

function sendAI() {
  const input = document.getElementById('ai-input');
  const text = input.value.trim();
  if (!text) return;
  addAIMessage(text, 'user');
  input.value = '';
  showTyping();
  // Use AI API for smart responses
  getAIResponse(text).then(reply => {
    hideTyping();
    addAIMessage(reply, 'bot');
  });
}

async function getAIResponse(userText) {
  const t_lower = userText.toLowerCase();

  // Quick local commands
  if (t_lower.includes('الرئيسية') || t_lower.includes('dashboard')) { showPage('dashboard'); return '✅ انتقلت للصفحة الرئيسية!'; }
  if (t_lower.includes('جدول') || t_lower.includes('schedule')) { showPage('schedule'); return '✅ هذا جدولك اليومي. لا تنسَ صلاة الفجر! 🕌'; }
  if (t_lower.includes('إحصائيات') || t_lower.includes('احصائيات')) { showPage('stats'); return '✅ هذه إحصائياتك. استمر!'; }
  if (t_lower.includes('مجموعة') || t_lower.includes('groups')) { showPage('groups'); return '✅ مجموعات الأصدقاء — حان وقت المنافسة! 🏆'; }
  if (t_lower.includes('إعدادات') || t_lower.includes('settings')) { showPage('settings'); return '✅ إعداداتك جاهزة.'; }

  // Add task command
  if ((t_lower.includes('أضف') || t_lower.includes('اضف') || t_lower.includes('add')) && (t_lower.includes('مهمة') || t_lower.includes('task'))) {
    let time = '12:00';
    const tm = userText.match(/(\d{1,2}):(\d{2})/);
    if (tm) time = tm[0];
    let cat = 'study';
    if (t_lower.includes('صلاة') || t_lower.includes('قرآن') || t_lower.includes('ديني')) cat = 'religious';
    else if (t_lower.includes('رياضة') || t_lower.includes('sport')) cat = 'sport';
    else if (t_lower.includes('اجتماعي') || t_lower.includes('social')) cat = 'social';
    else if (t_lower.includes('أخلاقي') || t_lower.includes('moral')) cat = 'moral';
    let title = userText.replace(/أضف|اضف|add|مهمة|مهمه|task|الساعة|ساعة|في|ديني|دراسي|رياضي|اجتماعي|أخلاقي/g, '').replace(/\d{1,2}:\d{2}/,'').trim() || 'مهمة جديدة';
    state.tasks.push({ id: Date.now(), title, time, category: cat, done: false, date: todayStr() });
    saveState();
    return `✅ أضفت "${title}" الساعة ${time}. بارك الله فيك!`;
  }

  // Color change
  if (t_lower.includes('لون') || t_lower.includes('color')) {
    const colors = { 'أخضر':'#1a5f4a', 'أزرق':'#1565c0', 'بنفسجي':'#6a1b9a', 'أحمر':'#b33939', 'برتقالي':'#e65100', 'بني':'#5d4037' };
    for (const [name, hex] of Object.entries(colors)) {
      if (t_lower.includes(name)) { setColor(hex); return `✅ غيّرت اللون إلى ${name}! 🎨`; }
    }
  }

  // Call Anthropic API for open-ended questions
  try {
    const doneToday = state.tasks.filter(t => t.done && t.date === todayStr()).length;
    const totalToday = state.tasks.filter(t => t.date === todayStr()).length;
    const systemPrompt = `أنت ${state.aiName}، مساعد ذكي في تطبيق رِتِّيب لإدارة الحياة اليومية.
المستخدم اسمه: ${state.user}.
إنجاز اليوم: ${doneToday} من ${totalToday} مهام.
المجموعات: ${state.groups.length}.
أجب بشكل مفيد وبإيجاز وبالعربية. يمكنك الإجابة على أي سؤال ديني أو علمي أو شخصي. كن محفزاً وإيجابياً.`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: userText }]
      })
    });
    const data = await response.json();
    const reply = data.content?.map(b => b.text || '').join('').trim();
    return reply || getLocalFallback();
  } catch(e) {
    return getLocalFallback();
  }
}

function getLocalFallback() {
  const replies = [
    `بارك الله فيك يا ${state.user || 'صديقي'}! حافظ على صلاة الفجر فهي نورك.`,
    'تذكر: "إن الله لا يضيع أجر من أحسن عملاً" — استمر!',
    'أنصحك ببدء يومك بورد من القرآن، فهو بركة في الوقت.',
    'الرياضة تقوي الجسد والعقل — 30 دقيقة تكفي!',
    'لا تنسَ أذكار الصباح والمساء، فهي درعك الواقي.',
    '"الأعمال بالنيات" — اجعل نيتك في كل شيء لله.',
    'التواصل الاجتماعي والأخلاق الحسنة من أعظم أسباب البركة.',
    'جرب: "أضف مهمة" · "غيّر اللون للأزرق" · "اذهب للإحصائيات"'
  ];
  return replies[Math.floor(Math.random() * replies.length)];
}

// ===================== MODAL =====================
function openModal(html) {
  document.getElementById('modal-content').innerHTML = '<button class="modal-close" onclick="closeModal()">✕</button>' + html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ===================== INIT =====================
loadState();
if (state.user) {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  document.getElementById('header-username').textContent = state.user;
  document.getElementById('ai-chat-title').textContent = state.aiName;
  showPage('dashboard');
}
</script>
